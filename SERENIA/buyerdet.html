<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buyer Details – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{--blue:#1400cc;--off:#f4f4f8;--text:#0a0030;--card:#fff;--gray:#888}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100vh;font-family:'Nunito',sans-serif;background:var(--off);color:var(--text)}

    .header{background:var(--blue);display:flex;align-items:center;gap:16px;padding:16px 32px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(20,0,204,.25)}
    .back-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;letter-spacing:.07em;text-transform:uppercase;padding:9px 18px;border-radius:10px;cursor:pointer;transition:background .2s;flex-shrink:0}
    .back-btn:hover{background:rgba(255,255,255,.25)}
    .header-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#fff;letter-spacing:.06em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .id-badge{background:rgba(255,255,255,.18);color:#fff;font-size:.8rem;font-weight:900;letter-spacing:.1em;padding:6px 14px;border-radius:8px;flex-shrink:0}

    .body-wrap{max-width:1000px;margin:0 auto;padding:36px 32px 80px;display:flex;flex-direction:column;gap:24px}

    /* HERO */
    .hero-card{background:var(--card);border-radius:20px;padding:32px 36px;box-shadow:0 4px 24px rgba(20,0,204,.08);display:flex;align-items:center;gap:32px}
    .hero-avatar{width:120px;height:120px;border-radius:50%;border:4px solid var(--blue);background:#e0d8f0;display:flex;align-items:center;justify-content:center;font-size:3.5rem;color:#bbb;overflow:hidden;flex-shrink:0}
    .hero-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .hero-info h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.05em;color:var(--text);margin-bottom:4px}
    .intent-badge{display:inline-block;background:var(--blue);color:#fff;font-size:.8rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border-radius:8px;margin-bottom:8px}
    .hero-info .contact{font-size:.9rem;font-weight:700;color:var(--gray);line-height:1.7}

    /* INFO GRID */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .info-card{background:var(--card);border-radius:16px;padding:24px 28px;box-shadow:0 2px 16px rgba(20,0,204,.07)}
    .info-card.full{grid-column:1/-1}
    .info-card h2{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.07em;color:var(--blue);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--off)}
    .detail-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--off);gap:12px}
    .detail-row:last-child{border-bottom:none}
    .detail-key{font-size:.8rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);flex-shrink:0}
    .detail-val{font-size:.95rem;font-weight:800;color:var(--text);text-align:right}
    .detail-val.big{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--blue);letter-spacing:.04em}

    /* TAGS */
    .tags-wrap{display:flex;flex-wrap:wrap;gap:8px}
    .tag{background:var(--off);color:var(--blue);font-size:.8rem;font-weight:900;letter-spacing:.05em;text-transform:uppercase;padding:5px 12px;border-radius:7px}
    .tag.submitted{background:#d4edda;color:#155724}

    /* INTERESTED PROPERTIES GRID */
    .prop-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:4px}
    .mini-prop-card{background:linear-gradient(135deg,var(--blue) 0%,#2c14ff 100%);border-radius:14px;padding:18px 20px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 16px rgba(20,0,204,.25)}
    .mini-prop-card:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 28px rgba(20,0,204,.4)}
    .mini-prop-id{font-size:.68rem;font-weight:900;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
    .mini-prop-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff;letter-spacing:.04em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mini-prop-sub{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.65)}
    .mini-prop-arrow{float:right;color:rgba(255,255,255,.5);font-size:1.1rem;margin-top:-22px}

    /* DOC PHOTOS */
    .doc-photo-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:4px}
    .doc-photo-item{width:120px;height:88px;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s}
    .doc-photo-item:hover{transform:scale(1.05)}
    .doc-photo-item img{width:100%;height:100%;object-fit:cover}

    /* LIGHTBOX */
    .lightbox{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.96);flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .lightbox.open{display:flex}
    .lb-img{max-width:92vw;max-height:85vh;object-fit:contain;border-radius:10px}
    .lb-close{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;font-size:1.3rem;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lb-close:hover{background:rgba(255,255,255,.25)}

    .loading-wrap{display:flex;justify-content:center;padding:100px}
    .spinner{width:52px;height:52px;border:5px solid rgba(20,0,204,.12);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .not-found{text-align:center;padding:100px 20px;color:var(--gray)}
    .not-found .em{font-size:4rem;margin-bottom:16px}
    .not-found p{font-weight:800;font-size:1.2rem;text-transform:uppercase}

    @media(max-width:700px){
      .info-grid{grid-template-columns:1fr}
      .info-card.full{grid-column:1}
      .hero-card{flex-direction:column;text-align:center}
      .body-wrap{padding:20px 16px 60px}
    }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">← BACK</button>
  <div class="header-title" id="headerTitle">Loading…</div>
  <div class="id-badge" id="headerID"></div>
  <a id="editBtn" href="#" style="background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.07em;text-transform:uppercase;padding:8px 16px;border-radius:10px;cursor:pointer;text-decoration:none;flex-shrink:0">✏️ EDIT</a>
  <a id="waBtn" href="#" target="_blank" style="background:rgba(37,211,102,.2);border:1.5px solid rgba(37,211,102,.4);color:#25d366;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.07em;text-transform:uppercase;padding:8px 16px;border-radius:10px;cursor:pointer;text-decoration:none;flex-shrink:0;display:none">💬 WHATSAPP</a>
  <button id="portalBtn" onclick="openPortalModal()" style="background:rgba(124,58,237,.2);border:1.5px solid rgba(124,58,237,.35);color:#c4b5fd;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.07em;text-transform:uppercase;padding:8px 16px;border-radius:10px;cursor:pointer;flex-shrink:0">🔑 PORTAL</button>
  <button onclick="doDelete()" style="background:rgba(220,38,38,.2);border:1.5px solid rgba(220,38,38,.4);color:#f87171;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;padding:8px 16px;border-radius:10px;cursor:pointer;flex-shrink:0">🗑 DELETE</button>
</div>

<div class="body-wrap" id="bodyWrap">
  <div class="loading-wrap"><div class="spinner"></div></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img class="lb-img" id="lbImg" src="" alt=""/>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const bId    = params.get('id');

  async function load() {
    if (!bId) { showNotFound(); return; }
    try {
      const res    = await fetch('/get_buyers');
      const buyers = await res.json();
      const buyer  = buyers.find(b => b.id === bId);
      if (!buyer) { showNotFound(); return; }
      render(buyer);
    } catch { showNotFound(); }
  }

  function render(b) {
    document.title = `${b.buyer_name||'Buyer'} – SERENIA`;
    document.getElementById('headerTitle').textContent = b.buyer_name || 'Buyer';
    document.getElementById('headerID').textContent    = `# ${b.id}`;
    document.getElementById('editBtn').href = 'editbuyer.html?id=' + b.id;
    _buyerId = b.id;
    if (b.phone) {
      const clean = b.phone.replace(/[^0-9+]/g,'');
      const waBtn = document.getElementById('waBtn');
      waBtn.href = `https://wa.me/${clean}?text=Hello%20${encodeURIComponent(b.buyer_name||'there')}%2C%20we%20have%20some%20exciting%20property%20options%20for%20you%20at%20SERENIA.`;
      waBtn.style.display = 'inline-flex';
    }

    const cur    = b.currency === 'INR' ? '₹' : 'AED';
    const budget = b.budget ? `${cur} ${Number(b.budget).toLocaleString()}` : '—';

    const photoSrc = b.photo_filename
      ? `/buyer_docs/${encodeURIComponent(b.buyer_name)}/${b.photo_filename}`
      : null;

    const heroAvatar = photoSrc
      ? `<div class="hero-avatar"><img src="${photoSrc}" onerror="this.parentElement.innerHTML='👤'"/></div>`
      : `<div class="hero-avatar">👤</div>`;

    // Info rows
    const rows = arr => arr.filter(r=>r[1]).map(([k,v])=>`
      <div class="detail-row">
        <span class="detail-key">${k}</span>
        <span class="detail-val">${esc(v)}</span>
      </div>`).join('');

    const infoRows = rows([
      ['Phone',           b.phone],
      ['Email',           b.email],
      ['Nationality',     b.nationality],
      ['Intent',          b.intent],
      ['Currency',        b.currency],
      ['Listed On',       b.created_at],
    ]);

    const prefRows = rows([
      ['Preferred Type',  b.pref_property_type],
      ['Preferred City',  b.pref_city],
      ['Min Bedrooms',    b.min_bedrooms],
    ]);

    // Interested properties
    const props = b.interested_properties || [];
    const propsHtml = props.length
      ? `<div class="prop-cards-grid">${
          props.map(p => `
            <div class="mini-prop-card" onclick="window.location.href='propdet.html?id=${esc(p.id)}'">
              <div class="mini-prop-id"># ${esc(p.id)}</div>
              <div class="mini-prop-title">${esc(p.title||'Untitled')}</div>
              <div class="mini-prop-sub">${esc([p.property_type,p.city].filter(Boolean).join(' · '))}</div>
              <div class="mini-prop-arrow">→</div>
            </div>`).join('')
        }</div>`
      : '<span style="color:#aaa;font-size:.85rem;font-weight:700">No properties linked</span>';

    const docs      = b.docs_submitted || [];
    const docPhotos = b.doc_photo_filenames || [];
    const docPhotosHtml = docPhotos.length
      ? `<div class="doc-photo-grid">${
          docPhotos.map(f=>`
            <div class="doc-photo-item" onclick="openLb('/buyer_docs/${encodeURIComponent(b.buyer_name)}/${f}')">
              <img src="/buyer_docs/${encodeURIComponent(b.buyer_name)}/${f}" loading="lazy"/>
            </div>`).join('')
        }</div>`
      : '<span style="color:#aaa;font-size:.85rem;font-weight:700">No document photos uploaded</span>';

    document.getElementById('bodyWrap').innerHTML = `
      <!-- HERO -->
      <div class="hero-card">
        ${heroAvatar}
        <div class="hero-info">
          <h2>${esc(b.buyer_name||'Unknown')}</h2>
          <span class="intent-badge">${esc(b.intent||'Buyer')}</span>
          <div class="contact">
            ${b.phone?`📞 ${esc(b.phone)}<br>`:''}
            ${b.email?`✉️ ${esc(b.email)}`:''}
          </div>
        </div>
      </div>

      <div class="info-grid">

        <div class="info-card">
          <h2>Personal Info</h2>
          ${infoRows||'<span style="color:#aaa">—</span>'}
        </div>

        <div class="info-card">
          <h2>Budget & Preferences</h2>
          <div class="detail-row">
            <span class="detail-key">Budget</span>
            <span class="detail-val big">${budget}</span>
          </div>
          ${prefRows}
          ${b.notes?`<div class="detail-row" style="margin-top:8px"><span class="detail-key">Notes</span><span class="detail-val" style="font-size:.88rem">${esc(b.notes)}</span></div>`:''}
        </div>

        <!-- INTERESTED PROPERTIES -->
        <div class="info-card full">
          <h2>Interested Properties (${props.length})</h2>
          ${propsHtml}
        </div>

        <!-- DOCS SUBMITTED -->
        ${docs.length?`
        <div class="info-card full">
          <h2>Docs Submitted</h2>
          <div class="tags-wrap">${docs.map(d=>`<span class="tag submitted">✓ ${esc(d)}</span>`).join('')}</div>
        </div>`:''}

        <!-- DOC PHOTOS -->
        <div class="info-card full">
          <h2>Document Photos</h2>
          ${docPhotosHtml}
        </div>

      </div>`;
  }

  function openLb(src) {
    document.getElementById('lbImg').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLb();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

  function showNotFound() {
    document.getElementById('headerTitle').textContent = 'Not Found';
    document.getElementById('bodyWrap').innerHTML = `<div class="not-found"><div class="em">🔍</div><p>Buyer not found</p></div>`;
  }
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

  async function doDelete() {
    if (!confirm('Delete this buyer? This cannot be undone.')) return;
    try {
      const res  = await fetch('/delete_buyer/' + bId, {method:'DELETE'});
      const json = await res.json();
      if (json.success) { alert('Buyer deleted.'); window.location.href = 'buyer.html'; }
      else alert('Error: ' + (json.error||'Unknown'));
    } catch { alert('Server error'); }
  }

  load();
</script>
<!-- Portal Account Modal -->
<div id="portalModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px">
  <div style="background:#1e1e3a;border-radius:20px;padding:28px 32px;width:100%;max-width:420px;border:1px solid rgba(255,255,255,.1);box-shadow:0 12px 48px rgba(0,0,0,.5)">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.07em;color:#c4b5fd;margin-bottom:16px">🔑 Client Portal Access</div>
    <div id="portalAccountInfo" style="background:rgba(255,255,255,.04);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:.85rem;font-weight:700;color:rgba(255,255,255,.5)">Loading…</div>
    <div id="portalCreateForm">
      <div style="margin-bottom:12px">
        <label style="display:block;color:rgba(255,255,255,.45);font-size:.7rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px">Username</label>
        <input type="text" id="portalUsername" placeholder="e.g. john.buyer" style="width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 13px;color:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;outline:none"/>
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;color:rgba(255,255,255,.45);font-size:.7rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px">Password</label>
        <input type="text" id="portalPassword" placeholder="Min 6 characters" style="width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 13px;color:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;outline:none"/>
      </div>
      <button onclick="createPortalAccount()" style="width:100%;background:#7c3aed;color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;cursor:pointer;margin-bottom:8px;transition:background .2s" onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#7c3aed'">Create Portal Account</button>
    </div>
    <button onclick="document.getElementById('portalModal').style.display='none'" style="width:100%;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:none;border-radius:10px;padding:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer">Close</button>
  </div>
</div>

<script>
  let _buyerId = null;

  function openPortalModal() {
    document.getElementById('portalModal').style.display = 'flex';
    loadPortalInfo();
  }

  async function loadPortalInfo() {
    if (!_buyerId) return;
    try {
      const res  = await fetch('/get_portal_accounts');
      const accs = await res.json();
      const acc  = accs.find(a => a.person_id === _buyerId && a.person_type === 'buyer');
      const infoEl = document.getElementById('portalAccountInfo');
      const formEl = document.getElementById('portalCreateForm');
      if (acc) {
        infoEl.innerHTML = `<div style="color:#4ade80;font-weight:800;margin-bottom:6px">✅ Portal account exists</div>
          <div>Username: <strong style="color:#fff">${esc(acc.username)}</strong></div>
          <div>Last login: ${acc.last_login||'Never'}</div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button onclick="deletePortalAcc('${acc.id}')" style="background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.3);color:#f87171;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:5px 12px;border-radius:7px;cursor:pointer">🗑 Remove Access</button>
            <a href="/portal_login" target="_blank" style="background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.3);color:#c4b5fd;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:5px 12px;border-radius:7px;cursor:pointer;text-decoration:none">🔗 Portal Link</a>
          </div>`;
        formEl.style.display = 'none';
      } else {
        infoEl.innerHTML = '<div style="color:rgba(255,255,255,.4)">No portal account yet. Create one below:</div>';
        formEl.style.display = 'block';
        // Pre-fill username from buyer name
        const nameRaw = document.querySelector('.detail-name')?.textContent || '';
        document.getElementById('portalUsername').value = nameRaw.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,16);
      }
    } catch { document.getElementById('portalAccountInfo').innerHTML = 'Failed to load'; }
  }

  async function createPortalAccount() {
    const username = document.getElementById('portalUsername').value.trim();
    const password = document.getElementById('portalPassword').value.trim();
    if (!username || !password) { alert('Enter username and password'); return; }
    if (password.length < 6)    { alert('Password must be 6+ characters'); return; }
    try {
      const res  = await fetch('/create_portal_account', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({person_type:'buyer', person_id:_buyerId, username, password}),
      });
      const json = await res.json();
      if (json.success) { loadPortalInfo(); showToast('✅ Portal account created!'); }
      else alert('❌ ' + (json.error||'Error'));
    } catch { alert('❌ Server error'); }
  }

  async function deletePortalAcc(id) {
    if (!confirm('Remove portal access for this client?')) return;
    try {
      const res  = await fetch(`/delete_portal_account/${id}`, {method:'DELETE'});
      const json = await res.json();
      if (json.success) { loadPortalInfo(); showToast('✅ Access removed'); }
      else alert('❌ '+json.error);
    } catch { alert('❌ Server error'); }
  }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employees – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100vh;font-family:'Nunito',sans-serif}
    body{
      background-image:url('empbg.png');
      background-size:cover;background-position:center;
      background-repeat:no-repeat;background-color:#0a0a1a;
      display:flex;flex-direction:column;min-height:100vh;
    }

    .header{background:#1400cc;text-align:center;padding:22px 20px 18px;position:relative}
    .header h1{font-size:3rem;font-weight:900;letter-spacing:.08em;color:#fff;text-transform:uppercase}
    .back-btn{position:absolute;left:24px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.35);border-radius:12px;padding:10px 22px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:background .2s,transform .15s}
    .back-btn:hover{background:rgba(255,255,255,.28);transform:translateY(-50%) scale(1.05)}

    .content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;gap:32px}

    /* TOP 3 STATS */
    .stats-row{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
    .stat-card{background:rgba(255,255,255,.95);border-radius:22px;padding:24px 28px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:200px;animation:fadeUp .5s ease both}
    .stat-card:nth-child(1){animation-delay:.05s}
    .stat-card:nth-child(2){animation-delay:.15s}
    .stat-card:nth-child(3){animation-delay:.25s}
    .stat-card:nth-child(4){animation-delay:.35s}
    .stat-card:nth-child(5){animation-delay:.45s}
    .stat-label{font-size:.88rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#111;line-height:1.35;margin-bottom:8px}
    .stat-value{font-size:2.8rem;font-weight:900;color:#111;line-height:1}
    .stat-value.active{color:#16a34a}
    .stat-value.inactive{color:#dc2626}

    /* DEPT STATS ROW */
    .dept-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;animation:fadeUp .5s ease .3s both}
    .dept-card{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:14px;padding:14px 20px;text-align:center;min-width:130px;backdrop-filter:blur(6px)}
    .dept-label{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.6);margin-bottom:4px}
    .dept-value{font-size:1.6rem;font-weight:900;color:#fff}

    /* BOTTOM ROW */
    .bottom-row{display:flex;gap:28px;justify-content:center;align-items:center;flex-wrap:wrap;animation:fadeUp .5s ease .5s both}
    .action-btn{background:#1400cc;color:#fff;font-family:'Nunito',sans-serif;font-size:2.2rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:22px;padding:28px 72px;cursor:pointer;min-width:250px;box-shadow:0 6px 28px rgba(20,0,204,.5),0 4px 14px rgba(0,0,0,.3);transition:background .18s,transform .15s,box-shadow .18s}
    .action-btn:hover{background:#2c14ff;transform:translateY(-4px) scale(1.03);box-shadow:0 12px 40px rgba(20,0,204,.7),0 6px 20px rgba(0,0,0,.35)}
    .action-btn:active{transform:scale(.97)}
    .stat-card.center{min-width:220px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:700px){
      .header h1{font-size:2rem}
      .stat-card{min-width:140px;padding:16px 18px}
      .action-btn{min-width:160px;padding:20px 32px;font-size:1.5rem}
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="window.location.href='home.html'">← BACK</button>
    <h1>EMPLOYEES</h1>
  </div>

  <div class="content">
    <!-- TOP STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total<br>Employees</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active<br>Employees</div>
        <div class="stat-value active" id="statActive">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Inactive<br>Employees</div>
        <div class="stat-value inactive" id="statInactive">—</div>
      </div>
    </div>

    <!-- DEPT BREAKDOWN -->
    <div class="dept-row" id="deptRow">
      <!-- populated by JS -->
    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row">
      <button class="action-btn" onclick="window.location.href='listemp.html'">LIST</button>
      <div class="stat-card center">
        <div class="stat-label">Total Employees<br>Listed</div>
        <div class="stat-value" id="statListed">—</div>
      </div>
      <button class="action-btn" onclick="window.location.href='viewemp.html'">VIEW</button>
    </div>
  </div>

  <script>
    const DEPTS = ['Sales','Rental','Legal','Finance','Admin','HR','Other'];

    async function loadStats() {
      try {
        const res  = await fetch('/get_employees');
        const emps = await res.json();
        const active   = emps.filter(e => e.status !== 'Inactive').length;
        const inactive = emps.filter(e => e.status === 'Inactive').length;

        animateCount('statTotal',    emps.length);
        animateCount('statActive',   active);
        animateCount('statInactive', inactive);
        animateCount('statListed',   emps.length);

        // Dept breakdown
        const deptRow = document.getElementById('deptRow');
        const counts  = {};
        emps.forEach(e => {
          const d = e.department || 'Other';
          counts[d] = (counts[d] || 0) + 1;
        });
        deptRow.innerHTML = Object.entries(counts).map(([d,n]) => `
          <div class="dept-card">
            <div class="dept-label">${d}</div>
            <div class="dept-value">${n}</div>
          </div>`).join('') || '';

      } catch {
        ['statTotal','statActive','statInactive','statListed'].forEach(id =>
          document.getElementById(id).textContent = '0');
      }
    }

    function animateCount(id, target) {
      const el = document.getElementById(id);
      if (!target) { el.textContent = '0'; return; }
      let n = 0;
      const step = Math.ceil(target / 30);
      const t = setInterval(() => { n = Math.min(n+step,target); el.textContent=n; if(n>=target)clearInterval(t); }, 20);
    }

    loadStats();
  </script>
</body>
</html>

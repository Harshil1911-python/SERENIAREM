<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Employees – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{--blue:#1400cc;--indigo:#818cf8;--bg:#0f0f23;--panel:#1a1a35;--card:#1e1e3a;--text:#e2e8f0;--gray:#64748b;--panel-w:268px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .layout{display:flex;height:100vh;width:100vw}

    /* LEFT */
    .left-panel{width:var(--panel-w);min-width:var(--panel-w);background:var(--panel);display:flex;flex-direction:column;height:100vh;overflow:hidden;border-right:1px solid rgba(255,255,255,.06)}
    .panel-top{padding:16px 16px 10px;flex-shrink:0}
    .home-btn{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-radius:10px;cursor:pointer;margin-bottom:12px;transition:background .2s;text-align:left}
    .home-btn:hover{background:rgba(255,255,255,.14)}
    .search-wrap{position:relative;margin-bottom:4px}
    .search-wrap input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 34px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;color:#fff;outline:none}
    .search-wrap input::placeholder{color:rgba(255,255,255,.3)}
    .search-wrap input:focus{border-color:var(--indigo)}
    .search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.82rem;color:rgba(255,255,255,.3);pointer-events:none}
    .search-wrap .sc{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:.95rem;color:rgba(255,255,255,.3);cursor:pointer;display:none}
    .search-wrap input:not(:placeholder-shown)~.sc{display:block}

    .filter-scroll{flex:1;overflow-y:auto;padding:8px 16px 12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
    .fs{margin-bottom:14px}
    .fl{color:rgba(255,255,255,.4);font-size:.68rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
    .fi,.fsel{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 12px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.84rem;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s}
    .fi::placeholder{color:rgba(255,255,255,.25)}
    .fi:focus,.fsel:focus{border-color:var(--indigo)}
    .fsel option{background:var(--panel);color:#fff}

    .total-count{color:rgba(255,255,255,.5);font-size:.8rem;font-weight:800;text-align:center;padding:10px 16px 6px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.06)}
    .total-count span{color:var(--indigo);font-size:1.1rem}
    .clear-btn{margin:8px 16px 14px;flex-shrink:0;width:calc(100% - 32px);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;font-weight:900;font-size:.78rem;letter-spacing:.07em;text-transform:uppercase;padding:8px;border-radius:10px;cursor:pointer;transition:background .2s}
    .clear-btn:hover{background:rgba(255,255,255,.12);color:#fff}

    /* RIGHT */
    .right-panel{flex:1;height:100vh;overflow-y:auto;padding:32px 36px;scrollbar-width:thin;scrollbar-color:var(--gray) transparent}
    .right-panel::-webkit-scrollbar{width:5px}
    .right-panel::-webkit-scrollbar-thumb{background:var(--gray);border-radius:6px}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .panel-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.06em;color:var(--indigo)}

    /* GRID */
    .emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:20px}

    /* CARD */
    .emp-card{background:var(--card);border-radius:18px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:transform .2s,box-shadow .2s;animation:cIn .4s ease both;display:flex;flex-direction:column;align-items:center;padding:22px 14px 16px;text-align:center;border:1px solid rgba(255,255,255,.06);position:relative}
    .emp-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 12px 36px rgba(129,140,248,.15)}
    @keyframes cIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* Status dot */
    .status-dot{position:absolute;top:14px;right:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--card)}
    .status-dot.active{background:#16a34a}
    .status-dot.inactive{background:#dc2626}

    .emp-avatar{width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid var(--indigo);margin-bottom:11px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(255,255,255,.3);overflow:hidden;flex-shrink:0}
    .emp-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .emp-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.04em;color:#fff;margin-bottom:3px}
    .emp-role{font-size:.7rem;font-weight:800;color:var(--indigo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
    .emp-dept{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase}
    .emp-stats{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.4);margin-top:6px}

    .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:rgba(255,255,255,.2)}
    .empty-state .em{font-size:3rem;margin-bottom:12px}
    .empty-state p{font-weight:800;font-size:1rem;letter-spacing:.06em;text-transform:uppercase}
    .loading-state{grid-column:1/-1;display:flex;justify-content:center;padding:80px}
    .spinner{width:44px;height:44px;border:4px solid rgba(129,140,248,.15);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="layout">

  <div class="left-panel">
    <div class="panel-top">
      <button class="home-btn" onclick="window.location.href='emp.html'">← EMPLOYEES</button>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="searchInput" placeholder="Search employees…" oninput="applyFilters()"/>
        <span class="sc" onclick="document.getElementById('searchInput').value='';applyFilters()">✕</span>
      </div>
    </div>

    <div class="filter-scroll">
      <div class="fs"><div class="fl">Status</div>
        <select class="fsel" id="fStatus" onchange="applyFilters()">
          <option value="">All</option>
          <option value="active">Active Only</option>
          <option value="inactive">Inactive Only</option>
        </select>
      </div>
      <div class="fs"><div class="fl">Department</div>
        <select class="fsel" id="fDept" onchange="applyFilters()">
          <option value="">All</option>
          <option>Sales</option><option>Rental</option><option>Legal</option>
          <option>Finance</option><option>Admin</option><option>HR</option><option>Other</option>
        </select>
      </div>
      <div class="fs"><div class="fl">Role</div>
        <select class="fsel" id="fRole" onchange="applyFilters()">
          <option value="">All</option>
          <option>Agent</option><option>Senior Agent</option><option>Property Manager</option>
          <option>Sales Manager</option><option>Branch Manager</option>
          <option>Admin</option><option>Coordinator</option><option>Legal Advisor</option>
          <option>Finance Officer</option><option>HR Manager</option><option>Other</option>
        </select>
      </div>
      <div class="fs"><div class="fl">Currency</div>
        <select class="fsel" id="fCur" onchange="applyFilters()">
          <option value="">All</option>
          <option value="AED">UAE (AED)</option>
          <option value="INR">India (₹)</option>
        </select>
      </div>
      <div class="fs"><div class="fl">Nationality</div>
        <input class="fi" type="text" id="fNat" placeholder="e.g. Indian…" oninput="applyFilters()"/>
      </div>
    </div>

    <div class="total-count" id="totalCount">Found: <span>—</span></div>
    <button class="clear-btn" onclick="clearFilters()">✕ Clear Filters</button>
  </div>

  <div class="right-panel">
    <div class="panel-header"><h1>Employees</h1></div>
    <div class="emp-grid" id="empGrid">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>

</div>
<script>
  let ALL = [];

  async function load() {
    try {
      const res = await fetch('/get_employees');
      ALL = await res.json();
      applyFilters();
    } catch {
      document.getElementById('empGrid').innerHTML=`<div class="empty-state"><div class="em">⚠️</div><p>Could not connect</p></div>`;
      document.querySelector('#totalCount span').textContent='0';
    }
  }

  function applyFilters() {
    const q      = document.getElementById('searchInput').value.trim().toLowerCase();
    const status = document.getElementById('fStatus').value;
    const dept   = document.getElementById('fDept').value;
    const role   = document.getElementById('fRole').value;
    const cur    = document.getElementById('fCur').value;
    const nat    = document.getElementById('fNat').value.trim().toLowerCase();

    const res = ALL.filter(e => {
      if (q) {
        const blob = [e.id,e.emp_name,e.phone,e.email,e.role,e.department,e.nationality].join(' ').toLowerCase();
        if (!blob.includes(q)) return false;
      }
      if (status === 'active'   && e.status === 'Inactive') return false;
      if (status === 'inactive' && e.status !== 'Inactive') return false;
      if (dept && e.department !== dept) return false;
      if (role && e.role !== role) return false;
      if (cur  && e.currency !== cur) return false;
      if (nat  && !(e.nationality||'').toLowerCase().includes(nat)) return false;
      return true;
    });

    renderGrid(res);
    document.querySelector('#totalCount span').textContent = res.length;
  }

  function renderGrid(emps) {
    const g = document.getElementById('empGrid');
    if (!emps.length) {
      g.innerHTML=`<div class="empty-state"><div class="em">👥</div><p>No employees found</p></div>`;
      return;
    }
    g.innerHTML = emps.map((e,i) => {
      const photoHtml = e.photo_filename
        ? `<div class="emp-avatar"><img src="/emp_docs/${encodeURIComponent(e.emp_name)}/${e.photo_filename}" onerror="this.parentElement.innerHTML='👤'"/></div>`
        : `<div class="emp-avatar">👤</div>`;
      const isActive = e.status !== 'Inactive';
      const np = (e.assigned_properties||[]).length;
      const nc = (e.assigned_clients||[]).length;
      return `
        <div class="emp-card" style="animation-delay:${i*.04}s" onclick="window.location.href='empdet.html?id=${esc(e.id)}'">
          <div class="status-dot ${isActive?'active':'inactive'}"></div>
          ${photoHtml}
          <div class="emp-name">${esc(e.emp_name||'Unknown')}</div>
          <div class="emp-role">${esc(e.role||'Employee')}</div>
          <div class="emp-dept">${esc(e.department||'')}</div>
          <div class="emp-stats">${np} prop · ${nc} client${nc!==1?'s':''}</div>
        </div>`;
    }).join('');
  }

  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
  function clearFilters(){
    document.getElementById('searchInput').value='';
    document.getElementById('fNat').value='';
    ['fStatus','fDept','fRole','fCur'].forEach(id=>document.getElementById(id).value='');
    applyFilters();
  }

  load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Buyers – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root{--blue:#1400cc;--off:#f4f4f8;--text:#0a0030;--card:#fff;--gray:#aaa;--panel-w:260px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--off);color:var(--text);overflow:hidden}
    .layout{display:flex;height:100vh;width:100vw}

    /* LEFT */
    .left-panel{width:var(--panel-w);min-width:var(--panel-w);background:var(--blue);display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .panel-top{padding:16px 16px 10px;flex-shrink:0}
    .home-btn{width:100%;background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-radius:10px;cursor:pointer;margin-bottom:12px;transition:background .2s;text-align:left}
    .home-btn:hover{background:rgba(255,255,255,.22)}
    .search-wrap{position:relative;margin-bottom:4px}
    .search-wrap input{width:100%;background:#fff;border:none;border-radius:10px;padding:10px 34px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);outline:none}
    .search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.85rem;color:#999;pointer-events:none}
    .search-wrap .sc{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:1rem;color:#999;cursor:pointer;display:none}
    .search-wrap input:not(:placeholder-shown)~.sc{display:block}

    .filter-scroll{flex:1;overflow-y:auto;padding:8px 16px 12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
    .fs{margin-bottom:14px}
    .fl{color:rgba(255,255,255,.55);font-size:.7rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
    .fi,.fsel{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 12px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.86rem;outline:none;appearance:none;-webkit-appearance:none}
    .fi::placeholder{color:rgba(255,255,255,.35)}
    .fi:focus,.fsel:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.18)}
    .fsel option{background:var(--blue);color:#fff}
    .rrow{display:flex;gap:6px}
    .rrow .fi{flex:1}
    .rsep{color:rgba(255,255,255,.45);font-weight:900;font-size:.82rem;align-self:center;flex-shrink:0}

    .total-count{color:rgba(255,255,255,.8);font-size:.82rem;font-weight:800;text-align:center;padding:10px 16px 6px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.12)}
    .total-count span{color:#fff;font-size:1.1rem}
    .clear-btn{margin:8px 16px 14px;flex-shrink:0;width:calc(100% - 32px);background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-weight:900;font-size:.8rem;letter-spacing:.07em;text-transform:uppercase;padding:9px;border-radius:10px;cursor:pointer;transition:background .2s}
    .clear-btn:hover{background:rgba(255,255,255,.2);color:#fff}

    /* RIGHT */
    .right-panel{flex:1;height:100vh;overflow-y:auto;padding:32px 36px;scrollbar-width:thin;scrollbar-color:var(--gray) transparent}
    .right-panel::-webkit-scrollbar{width:6px}
    .right-panel::-webkit-scrollbar-thumb{background:var(--gray);border-radius:6px}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .panel-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.06em;color:var(--blue)}

    .buyer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:24px}

    .buyer-card{background:var(--card);border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 4px 20px rgba(20,0,204,.1);transition:transform .2s,box-shadow .2s;animation:cIn .4s ease both;display:flex;flex-direction:column;align-items:center;padding:24px 16px 18px;text-align:center}
    .buyer-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 12px 36px rgba(20,0,204,.2)}
    @keyframes cIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

    .buyer-avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--blue);margin-bottom:12px;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:2.2rem;color:#aaa;overflow:hidden;flex-shrink:0}
    .buyer-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .buyer-name{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.04em;color:var(--text);margin-bottom:4px}
    .buyer-intent{font-size:.75rem;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .buyer-props{font-size:.78rem;font-weight:700;color:#666}

    .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:#bbb}
    .empty-state .em{font-size:3rem;margin-bottom:12px}
    .empty-state p{font-weight:800;font-size:1rem;letter-spacing:.06em;text-transform:uppercase}
    .loading-state{grid-column:1/-1;display:flex;justify-content:center;padding:80px}
    .spinner{width:46px;height:46px;border:5px solid rgba(20,0,204,.12);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="layout">

  <div class="left-panel">
    <div class="panel-top">
      <button class="home-btn" onclick="window.location.href='buyer.html'">← BUYERS</button>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="searchInput" placeholder="Search buyers…" oninput="applyFilters()"/>
        <span class="sc" onclick="document.getElementById('searchInput').value='';applyFilters()">✕</span>
      </div>
    </div>
    <div class="filter-scroll">
      <div class="fs"><div class="fl">Intent</div>
        <select class="fsel" id="fIntent" onchange="applyFilters()">
          <option value="">All</option>
          <option>Buy / Own</option>
          <option>Rent</option>
          <option>Lease</option>
          <option>Investment</option>
          <option>Commercial Buy</option>
          <option>Commercial Rent</option>
          <option>Other</option>
        </select>
      </div>
      <div class="fs"><div class="fl">Currency</div>
        <select class="fsel" id="fCur" onchange="applyFilters()">
          <option value="">All</option>
          <option value="AED">UAE (AED)</option>
          <option value="INR">India (₹)</option>
        </select>
      </div>
      <div class="fs"><div class="fl">Preferred Property Type</div>
        <select class="fsel" id="fType" onchange="applyFilters()">
          <option value="">All</option>
          <option>Apartment</option>
          <option>Apartment / Flat</option>
          <option>Villa</option>
          <option>Penthouse</option>
          <option>Townhouse</option>
          <option>Bungalow</option>
          <option>Independent House</option>
          <option>Studio</option>
          <option>Plot / Land</option>
          <option>Other</option>
        </select>
      </div>
      <div class="fs"><div class="fl">Preferred City</div>
        <input class="fi" type="text" id="fCity" placeholder="e.g. Dubai…" oninput="applyFilters()"/>
      </div>
      <div class="fs"><div class="fl">Nationality</div>
        <input class="fi" type="text" id="fNat" placeholder="e.g. Indian…" oninput="applyFilters()"/>
      </div>
      <div class="fs"><div class="fl">Budget (Max)</div>
        <input class="fi" type="number" id="fBudgetMax" placeholder="Max budget" oninput="applyFilters()"/>
      </div>
      <div class="fs"><div class="fl">Min Bedrooms</div>
        <select class="fsel" id="fBeds" onchange="applyFilters()">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
        </select>
      </div>
    </div>
    <div class="total-count" id="totalCount">Found: <span>—</span></div>
    <button class="clear-btn" onclick="clearFilters()">✕ Clear Filters</button>
  </div>

  <div class="right-panel">
    <div class="panel-header"><h1>Buyers</h1></div>
    <div class="buyer-grid" id="buyerGrid">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>

</div>
<script>
  let ALL = [];

  async function load() {
    try {
      const res = await fetch('/get_buyers');
      ALL = await res.json();
      applyFilters();
    } catch {
      document.getElementById('buyerGrid').innerHTML=`<div class="empty-state"><div class="em">⚠️</div><p>Could not connect</p></div>`;
      document.querySelector('#totalCount span').textContent='0';
    }
  }

  function applyFilters() {
    const q      = document.getElementById('searchInput').value.trim().toLowerCase();
    const intent = document.getElementById('fIntent').value;
    const cur    = document.getElementById('fCur').value;
    const type   = document.getElementById('fType').value;
    const city   = document.getElementById('fCity').value.trim().toLowerCase();
    const nat    = document.getElementById('fNat').value.trim().toLowerCase();
    const bMax   = +document.getElementById('fBudgetMax').value || Infinity;
    const beds   = document.getElementById('fBeds').value;

    const res = ALL.filter(b => {
      if (q) {
        const blob = [b.id,b.buyer_name,b.phone,b.email,b.nationality,b.intent,b.pref_property_type,b.pref_city,
          (b.interested_properties||[]).map(p=>p.title).join(' ')].join(' ').toLowerCase();
        if (!blob.includes(q)) return false;
      }
      if (intent && b.intent !== intent) return false;
      if (cur    && b.currency !== cur) return false;
      if (type   && b.pref_property_type !== type) return false;
      if (city   && !(b.pref_city||'').toLowerCase().includes(city)) return false;
      if (nat    && !(b.nationality||'').toLowerCase().includes(nat)) return false;
      const budget = +b.budget || 0;
      if (budget > 0 && budget > bMax) return false;
      if (beds !== '' && (+b.min_bedrooms||0) < +beds) return false;
      return true;
    });

    renderGrid(res);
    document.querySelector('#totalCount span').textContent = res.length;
  }

  function renderGrid(buyers) {
    const g = document.getElementById('buyerGrid');
    if (!buyers.length) {
      g.innerHTML=`<div class="empty-state"><div class="em">🧑‍💼</div><p>No buyers found</p></div>`;
      return;
    }
    g.innerHTML = buyers.map((b,i) => {
      const photoHtml = b.photo_filename
        ? `<div class="buyer-avatar"><img src="/buyer_docs/${encodeURIComponent(b.buyer_name)}/${b.photo_filename}" onerror="this.parentElement.innerHTML='👤'"/></div>`
        : `<div class="buyer-avatar">👤</div>`;
      const n = (b.interested_properties||[]).length;
      const propStr = n ? `${n} propert${n===1?'y':'ies'} interested` : 'No properties linked';
      return `
        <div class="buyer-card" style="animation-delay:${i*.04}s" onclick="window.location.href='buyerdet.html?id=${esc(b.id)}'">
          ${photoHtml}
          <div class="buyer-name">${esc(b.buyer_name||'Unknown')}</div>
          <div class="buyer-intent">${esc(b.intent||'Buyer')}</div>
          <div class="buyer-props">${propStr}</div>
        </div>`;
    }).join('');
  }

  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
  function clearFilters(){
    ['searchInput','fCity','fNat','fBudgetMax'].forEach(id=>document.getElementById(id).value='');
    ['fIntent','fCur','fType','fBeds'].forEach(id=>document.getElementById(id).value='');
    applyFilters();
  }

  load();
</script>
</body>
</html>

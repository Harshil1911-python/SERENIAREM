<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Property – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100vh;font-family:'Nunito',sans-serif}
    body{background:#D9C8E8}

    .page-header{background:#D4A8E8;text-align:center;padding:26px 20px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(91,33,245,.12)}
    .page-header h1{font-size:2.4rem;font-weight:900;letter-spacing:.06em;color:#1a1a2e;text-transform:uppercase}
    .back-btn{position:absolute;left:24px;top:50%;transform:translateY(-50%);background:#5B21F5;color:#fff;border:none;border-radius:12px;padding:10px 22px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:background .2s,transform .15s}
    .back-btn:hover{background:#6B31FF;transform:translateY(-50%) scale(1.05)}

    .scroll-wrap{max-width:900px;margin:0 auto;padding:32px 24px 80px;display:flex;flex-direction:column;gap:26px}

    .card{background:#9B6DBF;border-radius:24px;padding:34px 38px;box-shadow:0 8px 32px rgba(91,33,245,.18);animation:fadeUp .5s ease both}
    .card:nth-child(2){animation-delay:.08s}
    .card:nth-child(3){animation-delay:.16s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    .card-title{color:#fff;font-weight:900;font-size:1.15rem;letter-spacing:.07em;text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid rgba(255,255,255,.2)}

    .form-row{display:flex;align-items:center;gap:16px;margin-bottom:18px}
    .form-row:last-child{margin-bottom:0}
    .form-row label{color:#fff;font-weight:900;font-size:1rem;letter-spacing:.05em;text-transform:uppercase;min-width:220px;flex-shrink:0}
    .form-row input,.form-row select,.form-row textarea{flex:1;background:#E8DFF0;border:none;border-radius:50px;padding:13px 20px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;color:#1a1a2e;outline:none;transition:box-shadow .2s;appearance:none;-webkit-appearance:none}
    .form-row textarea{border-radius:16px;resize:vertical;min-height:52px}
    .form-row input:focus,.form-row select:focus,.form-row textarea:focus{box-shadow:0 0 0 3px rgba(91,33,245,.35);background:#f0e8ff}
    .select-wrap{flex:1;position:relative}
    .select-wrap select{width:100%;padding-right:44px;cursor:pointer}
    .select-wrap .arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;color:#7B4FA0}

    /* existing media thumbnails */
    .media-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
    .media-thumb{position:relative;width:90px;height:70px;border-radius:10px;overflow:hidden;flex-shrink:0}
    .media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover}
    .media-thumb .rm-media{position:absolute;top:3px;right:3px;background:rgba(220,38,38,.85);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900}

    .add-btn{display:inline-flex;align-items:center;gap:8px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;padding:10px 20px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;transition:background .2s,transform .15s;margin-top:8px}
    .add-btn:hover{background:#333;transform:scale(1.04)}
    .add-btn .plus{width:22px;height:22px;background:#9B6DBF;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900}

    /* Checkboxes */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .check-panel{background:#E8DFF0;border-radius:18px;padding:22px 26px}
    .check-panel h3{font-weight:900;font-size:1.1rem;text-transform:uppercase;letter-spacing:.06em;color:#1a1a2e;margin-bottom:14px;text-align:center}
    .check-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
    .check-item{display:flex;align-items:center;gap:8px;cursor:pointer}
    .check-item input[type="checkbox"]{width:18px;height:18px;accent-color:#5B21F5;cursor:pointer;flex-shrink:0}
    .check-item span{font-weight:800;font-size:.9rem;text-transform:uppercase;letter-spacing:.04em;color:#5B21F5}

    .submit-wrap{text-align:center;padding:8px 0}
    .submit-btn{background:#5B21F5;color:#fff;font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:60px;padding:20px 90px;cursor:pointer;box-shadow:0 0 28px rgba(91,33,245,.5);transition:background .2s,transform .15s}
    .submit-btn:hover{background:#6B31FF;transform:translateY(-3px) scale(1.03)}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:14px 32px;border-radius:60px;box-shadow:0 8px 28px rgba(0,0,0,.25);transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0;z-index:999;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#9B6DBF;border-radius:20px;padding:28px 32px;min-width:300px;box-shadow:0 12px 48px rgba(0,0,0,.3);display:flex;flex-direction:column;gap:12px}
    .modal-box h3{color:#fff;font-weight:900;font-size:1.1rem;text-transform:uppercase}
    .modal-box input{background:#E8DFF0;border:none;border-radius:50px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;outline:none;color:#1a1a2e}
    .modal-btns{display:flex;gap:10px}
    .modal-btns button{flex:1;border:none;border-radius:50px;padding:10px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;cursor:pointer}
    .modal-btns .confirm{background:#5B21F5;color:#fff}
    .modal-btns .cancel{background:#E8DFF0;color:#1a1a2e}

    .loading{text-align:center;padding:80px;color:#7B4FA0;font-weight:900;font-size:1.2rem}

    @media(max-width:640px){.form-row{flex-direction:column;align-items:flex-start}.form-row label{min-width:unset}.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="page-header">
  <button class="back-btn" id="backBtn" onclick="history.back()">← BACK</button>
  <h1>EDIT PROPERTY</h1>
</div>

<div class="scroll-wrap" id="scrollWrap">
  <div class="loading">Loading property…</div>
</div>

<div id="toast"></div>

<!-- Custom amenity/doc modal -->
<div class="modal-overlay" id="addCheckModal">
  <div class="modal-box">
    <h3 id="addCheckTitle">Add Item</h3>
    <input type="text" id="addCheckInput" placeholder="Enter name…"/>
    <div class="modal-btns">
      <button class="cancel" onclick="document.getElementById('addCheckModal').classList.remove('open')">Cancel</button>
      <button class="confirm" onclick="saveCheckItem()">Add</button>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const propId = params.get('id');
  let _prop = null;
  let _newPhotos = [], _newVideos = [];
  let _removedPhotos = [], _removedVideos = [];
  let _addCheckTarget = '';

  async function loadProperty() {
    if (!propId) { document.getElementById('scrollWrap').innerHTML = '<div class="loading">No property ID</div>'; return; }
    try {
      const res   = await fetch('/get_properties');
      const props = await res.json();
      _prop = props.find(p => p.id === propId);
      if (!_prop) { document.getElementById('scrollWrap').innerHTML = '<div class="loading">Property not found</div>'; return; }
      renderForm();
    } catch { document.getElementById('scrollWrap').innerHTML = '<div class="loading">Error loading</div>'; }
  }

  function renderForm() {
    const p = _prop;
    const photos = (p.photos||[]).map((f,i) => `
      <div class="media-thumb" id="pt_${i}">
        <img src="/photos/${f}" loading="lazy"/>
        <button class="rm-media" onclick="removeExistingFile('photo','${f}',this.parentElement)">✕</button>
      </div>`).join('');
    const videos = (p.videos||[]).map((f,i) => `
      <div class="media-thumb" id="vt_${i}">
        <video src="/videos/${f}"></video>
        <button class="rm-media" onclick="removeExistingFile('video','${f}',this.parentElement)">✕</button>
      </div>`).join('');

    const amenities = ['Elevator','Parking','Playground','Swimming Pool','Helipad','Library','Temple','Club','Gym'];
    const docs = ['Emirates ID','Title Deed','Passport Copy','Form A','MOU','NOC','Service Charge','Mortgage Clearance','Original Keys','OC / CC','Building Plan Approval','Loan Sanction Letter'];

    const amenHTML = [...new Set([...amenities, ...(p.amenities||[])])].map(a => `
      <label class="check-item">
        <input type="checkbox" value="${a}" ${(p.amenities||[]).includes(a)?'checked':''}/>
        <span>${a.toUpperCase()}</span>
      </label>`).join('');

    const docHTML = [...new Set([...docs, ...(p.docs_required||[])])].map(d => `
      <label class="check-item">
        <input type="checkbox" value="${d}" ${(p.docs_required||[]).includes(d)?'checked':''}/>
        <span>${d.toUpperCase()}</span>
      </label>`).join('');

    document.getElementById('scrollWrap').innerHTML = `
      <!-- CARD 1: Basic Info -->
      <div class="card">
        <div class="card-title">Basic Information</div>
        <div class="form-row"><label>Property Type:</label>
          <div class="select-wrap">
            <select id="propType"><option value="">—</option>
              ${['Apartment','Penthouse','Bungalow','Townhouse','Villa','Studio','Duplex','Warehouse','Office','Retail','Land','Other'].map(t=>`<option ${p.property_type===t?'selected':''}>${t}</option>`).join('')}
              ${p.property_type && !['Apartment','Penthouse','Bungalow','Townhouse','Villa','Studio','Duplex','Warehouse','Office','Retail','Land','Other'].includes(p.property_type)?`<option selected>${p.property_type}</option>`:''}
            </select><span class="arrow">▼</span>
          </div>
        </div>
        <div class="form-row"><label>Category:</label>
          <div class="select-wrap">
            <select id="category"><option value="">—</option>
              ${['Rent','Own / Buy','Lease','Short-Term Rental','Commercial Lease','Other'].map(c=>`<option ${p.category===c?'selected':''}>${c}</option>`).join('')}
              ${p.category && !['Rent','Own / Buy','Lease','Short-Term Rental','Commercial Lease','Other'].includes(p.category)?`<option selected>${p.category}</option>`:''}
            </select><span class="arrow">▼</span>
          </div>
        </div>
        <div class="form-row"><label>Title:</label><input type="text" id="title" value="${esc(p.title||'')}"/></div>
        <div class="form-row"><label>Full Address:</label><input type="text" id="address" value="${esc(p.address||'')}"/></div>
        <div class="form-row"><label>City:</label><input type="text" id="city" value="${esc(p.city||'')}"/></div>
        <div class="form-row"><label>State:</label><input type="text" id="state" value="${esc(p.state||'')}"/></div>
        <div class="form-row"><label>PIN Code:</label><input type="text" id="pincode" value="${esc(p.pincode||'')}"/></div>
        <div class="form-row"><label>Bedrooms:</label><input type="number" id="bedrooms" value="${p.bedrooms||''}"/></div>
        <div class="form-row"><label>Bathrooms:</label><input type="number" id="bathrooms" value="${p.bathrooms||''}"/></div>
        <div class="form-row"><label>Area (sqft):</label><input type="number" id="area" value="${p.area_sqft||''}"/></div>
        <div class="form-row" style="align-items:flex-start">
          <label style="padding-top:12px">Location Pin:</label>
          <div style="flex:1;display:flex;flex-direction:column;gap:10px">
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <input type="number" id="lat" step="any" value="${p.lat||''}" placeholder="Latitude" style="flex:1;min-width:120px"/>
              <input type="number" id="lng" step="any" value="${p.lng||''}" placeholder="Longitude" style="flex:1;min-width:120px"/>
              <button type="button" onclick="getMyLocation()" style="background:#5B21F5;color:#fff;border:none;border-radius:50px;padding:11px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;white-space:nowrap" onmouseover="this.style.background='#6B31FF'" onmouseout="this.style.background='#5B21F5'">📍 My Location</button>
            </div>
            <span id="locStatus" style="font-size:.78rem;font-weight:700;color:rgba(255,255,255,.6)"></span>
            <div id="miniMap" style="width:100%;height:260px;border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,.25);position:relative">
              <div id="miniMapLoading" style="position:absolute;inset:0;background:#7B4FA0;display:flex;align-items:center;justify-content:center;z-index:10;color:rgba(255,255,255,.6);font-weight:800;font-size:.85rem">Loading map…</div>
            </div>
            <div style="font-size:.78rem;font-weight:700;color:rgba(255,255,255,.55)">🖱 Click map or drag the pin to set exact location</div>
          </div>
        </div>
      </div>

      <!-- CARD 2: Pricing -->
      <div class="card">
        <div class="card-title">Pricing & Seller</div>
        <div class="form-row"><label>Sale Price (AED/₹):</label><input type="number" id="salePrice" value="${p.sale_price_aed||p.sale_price_inr||''}"/></div>
        <div class="form-row"><label>Per Sqft Price:</label><input type="number" id="perSqft" value="${p.per_sqft_price_aed||p.per_sqft_price_inr||''}"/></div>
        <div class="form-row"><label>Monthly Rent:</label><input type="number" id="rent" value="${p.monthly_rent_aed||p.monthly_rent_inr||''}"/></div>
        <div class="form-row"><label>Seller Name:</label><input type="text" id="sellerName" value="${esc(p.seller_name||'')}"/></div>
        <div class="form-row"><label>Seller Phone:</label><input type="tel" id="sellerPhone" value="${esc(p.seller_phone||'')}"/></div>
        <div class="form-row"><label>Description:</label><textarea id="description">${esc(p.description||'')}</textarea></div>

        <div class="card-title" style="margin-top:20px">Photos</div>
        <div class="media-grid" id="photoGrid">${photos}</div>
        <button class="add-btn" onclick="document.getElementById('newPhotoInput').click()">Add Photos <span class="plus">+</span></button>
        <input type="file" id="newPhotoInput" accept="image/*" multiple style="display:none" onchange="handleNewFiles(this,'photo')"/>

        <div class="card-title" style="margin-top:20px">Videos</div>
        <div class="media-grid" id="videoGrid">${videos}</div>
        <button class="add-btn" onclick="document.getElementById('newVideoInput').click()">Add Videos <span class="plus">+</span></button>
        <input type="file" id="newVideoInput" accept="video/*" multiple style="display:none" onchange="handleNewFiles(this,'video')"/>
      </div>

      <!-- CARD 3: Amenities & Docs -->
      <div class="card">
        <div class="two-col">
          <div class="check-panel">
            <h3>Amenities</h3>
            <div class="check-list" id="amenitiesList">${amenHTML}</div>
            <button class="add-btn" onclick="openCheckModal('amenities')">Add <span class="plus">+</span></button>
          </div>
          <div class="check-panel">
            <h3>Docs Required</h3>
            <div class="check-list" id="docsList">${docHTML}</div>
            <button class="add-btn" onclick="openCheckModal('docs')">Add <span class="plus">+</span></button>
          </div>
        </div>
      </div>

      <div class="submit-wrap">
        <button class="submit-btn" id="saveBtn" onclick="saveChanges()">SAVE CHANGES</button>
      </div>`;

    // Signal that DOM is ready for map init
    document.dispatchEvent(new Event('minimap-ready'));
  }

  function removeExistingFile(type, filename, el) {
    if (type === 'photo') _removedPhotos.push(filename);
    else _removedVideos.push(filename);
    el.remove();
  }

  function handleNewFiles(input, type) {
    Array.from(input.files).forEach(f => {
      if (type === 'photo') _newPhotos.push(f);
      else _newVideos.push(f);

      const grid = document.getElementById(type === 'photo' ? 'photoGrid' : 'videoGrid');
      const div  = document.createElement('div');
      div.className = 'media-thumb';

      const img = document.createElement('img');
      const r   = new FileReader();
      r.onload  = e => { img.src = e.target.result; };
      r.readAsDataURL(f);

      const btn = document.createElement('button');
      btn.className   = 'rm-media';
      btn.textContent = '✕';
      // Use the file reference itself — no stale index problem
      const fileRef = f;
      btn.onclick = () => {
        if (type === 'photo') {
          const i = _newPhotos.indexOf(fileRef);
          if (i > -1) _newPhotos.splice(i, 1);
        } else {
          const i = _newVideos.indexOf(fileRef);
          if (i > -1) _newVideos.splice(i, 1);
        }
        div.remove();
      };

      div.appendChild(img);
      div.appendChild(btn);
      grid.appendChild(div);
    });
    input.value = '';
  }

  function openCheckModal(target) {
    _addCheckTarget = target;
    document.getElementById('addCheckTitle').textContent = target === 'amenities' ? 'Add Amenity' : 'Add Document';
    document.getElementById('addCheckInput').value = '';
    document.getElementById('addCheckModal').classList.add('open');
  }
  function saveCheckItem() {
    const val = document.getElementById('addCheckInput').value.trim(); if (!val) return;
    const listId = _addCheckTarget === 'amenities' ? 'amenitiesList' : 'docsList';
    const label = document.createElement('label'); label.className = 'check-item';
    label.innerHTML = `<input type="checkbox" value="${val}" checked/><span>${val.toUpperCase()}</span>`;
    document.getElementById(listId).appendChild(label);
    document.getElementById('addCheckModal').classList.remove('open');
  }

  function getChecked(id) { return [...document.querySelectorAll(`#${id} input[type="checkbox"]:checked`)].map(c=>c.value); }

  function showToast(msg,dur=3500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

  function getMyLocation() {
    const status = document.getElementById('locStatus');
    if (!navigator.geolocation) { status.textContent = '❌ Not supported'; return; }
    status.textContent = '⏳ Getting location…';
    navigator.geolocation.getCurrentPosition(
      pos => {
        document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('lng').value = pos.coords.longitude.toFixed(6);
        status.textContent = '✅ Location set!';
        setTimeout(() => status.textContent = '', 3000);
      },
      () => { status.textContent = '❌ Location denied'; }
    );
  }

  async function saveChanges() {
    const cur = _prop.currency === 'INR' ? 'inr' : 'aed';
    const data = {
      property_type: document.getElementById('propType').value,
      category:      document.getElementById('category').value,
      title:         document.getElementById('title').value.trim(),
      address:       document.getElementById('address').value.trim(),
      city:          document.getElementById('city').value.trim(),
      state:         document.getElementById('state').value.trim(),
      pincode:       document.getElementById('pincode').value.trim(),
      bedrooms:      document.getElementById('bedrooms').value,
      bathrooms:     document.getElementById('bathrooms').value,
      area_sqft:     document.getElementById('area').value,
      lat:           document.getElementById('lat').value,
      lng:           document.getElementById('lng').value,
      [`sale_price_${cur}`]:     document.getElementById('salePrice').value,
      [`per_sqft_price_${cur}`]: document.getElementById('perSqft').value,
      [`monthly_rent_${cur}`]:   document.getElementById('rent').value,
      seller_name:   document.getElementById('sellerName').value.trim(),
      seller_phone:  document.getElementById('sellerPhone').value.trim(),
      description:   document.getElementById('description').value.trim(),
      amenities:     getChecked('amenitiesList'),
      docs_required: getChecked('docsList'),
      removed_photos: _removedPhotos,
      removed_videos: _removedVideos,
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'SAVING…';

    const fd = new FormData();
    fd.append('data', JSON.stringify(data));
    _newPhotos.forEach(f => fd.append('photos', f));
    _newVideos.forEach(f => fd.append('videos', f));

    try {
      const res  = await fetch(`/update_property/${propId}`, {method:'POST', body:fd});
      const json = await res.json();
      if (json.success) {
        showToast('✅ Property updated!', 3000);
        setTimeout(() => window.location.href = `propdet.html?id=${propId}`, 1500);
      } else {
        showToast('❌ ' + (json.error||'Error'));
        btn.disabled=false; btn.textContent='SAVE CHANGES';
      }
    } catch {
      showToast('❌ Server error');
      btn.disabled=false; btn.textContent='SAVE CHANGES';
    }
  }

  loadProperty();

  // ── Mini Map (initialized after renderForm runs) ──
  let _miniMap, _miniMarker;

  function initMiniMap() {
    const latVal = parseFloat(document.getElementById('lat')?.value);
    const lngVal = parseFloat(document.getElementById('lng')?.value);
    const hasCoords = !isNaN(latVal) && !isNaN(lngVal);
    const defaultLat = hasCoords ? latVal : 25.2048;
    const defaultLng = hasCoords ? lngVal : 55.2708;
    const defaultZoom = hasCoords ? 14 : 5;

    document.getElementById('miniMapLoading').style.display = 'none';

    _miniMap = L.map('miniMap', {zoomControl:true}).setView([defaultLat, defaultLng], defaultZoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {attribution:'© OpenStreetMap', maxZoom:19}).addTo(_miniMap);

    _miniMarker = L.marker([defaultLat, defaultLng], {draggable:true}).addTo(_miniMap);
    _miniMarker.bindPopup('<b style="font-family:sans-serif">Drag to reposition</b>');
    if (hasCoords) _miniMarker.openPopup();

    _miniMarker.on('dragend', e => {
      const pos = e.target.getLatLng();
      document.getElementById('lat').value = pos.lat.toFixed(6);
      document.getElementById('lng').value = pos.lng.toFixed(6);
    });

    _miniMap.on('click', e => {
      _miniMarker.setLatLng(e.latlng);
      document.getElementById('lat').value = e.latlng.lat.toFixed(6);
      document.getElementById('lng').value = e.latlng.lng.toFixed(6);
    });

    ['lat','lng'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        const la = parseFloat(document.getElementById('lat').value);
        const ln = parseFloat(document.getElementById('lng').value);
        if (!isNaN(la) && !isNaN(ln)) {
          _miniMarker.setLatLng([la, ln]);
          _miniMap.setView([la, ln], _miniMap.getZoom());
        }
      });
    });

    setTimeout(() => _miniMap.invalidateSize(), 300);
  }

  // renderForm is called after property loads — init map after that
  const _origRenderForm = renderForm;
  // Map init triggered after DOM is built by renderForm
  document.addEventListener('minimap-ready', () => setTimeout(initMiniMap, 200));
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</body>

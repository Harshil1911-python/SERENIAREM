<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Brochure – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100vh;font-family:'Nunito',sans-serif;background:#0a0a1a;color:#e2e8f0}
    .header{background:#1400cc;display:flex;align-items:center;gap:14px;padding:13px 24px;box-shadow:0 4px 20px rgba(20,0,204,.4)}
    .back-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.07em;text-transform:uppercase;padding:7px 16px;border-radius:9px;cursor:pointer}
    .back-btn:hover{background:rgba(255,255,255,.25)}
    .header-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;letter-spacing:.07em;flex:1}

    .main-wrap{max-width:1200px;margin:0 auto;padding:24px 20px 80px;display:grid;grid-template-columns:320px 1fr;gap:20px}
    @media(max-width:900px){.main-wrap{grid-template-columns:1fr}}

    .card{background:#1e1e3a;border-radius:16px;padding:20px 22px;border:1px solid rgba(255,255,255,.07)}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.07em;color:#818cf8;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.07)}

    .prop-select{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 13px;color:#fff;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;outline:none;appearance:none;transition:border-color .2s;margin-bottom:14px}
    .prop-select:focus{border-color:#818cf8}
    .prop-select option{background:#1e1e3a}

    /* LAYOUT PICKER */
    .layout-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .layout-opt{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .2s}
    .layout-opt:hover{border-color:rgba(129,140,248,.4)}
    .layout-opt.selected{border-color:#1400cc;background:rgba(20,0,204,.2)}
    .layout-preview{width:100%;height:44px;border-radius:5px;margin-bottom:5px;overflow:hidden;background:rgba(255,255,255,.04)}
    .layout-name{font-size:.68rem;font-weight:900;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}
    .layout-opt.selected .layout-name{color:#fff}

    /* OPTIONS */
    .options-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
    .opt-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 11px;cursor:pointer;transition:all .18s}
    .opt-chip.checked{background:rgba(20,0,204,.2);border-color:#1400cc}
    .opt-chip input{accent-color:#818cf8;width:14px;height:14px;cursor:pointer}
    .opt-chip span{font-size:.75rem;font-weight:800;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.04em}
    .opt-chip.checked span{color:#fff}

    .gen-btn{width:100%;background:#1400cc;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem;letter-spacing:.07em;text-transform:uppercase;border:none;border-radius:11px;padding:13px;cursor:pointer;box-shadow:0 0 16px rgba(20,0,204,.4);transition:all .2s;display:none}
    .gen-btn:hover{background:#2c14ff;transform:translateY(-1px)}

    /* SHARE BOX */
    .share-box{display:none;background:rgba(124,58,237,.1);border:1.5px solid rgba(124,58,237,.25);border-radius:12px;padding:13px 15px;margin-top:12px}
    .share-label{font-size:.67rem;font-weight:900;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
    .share-row{display:flex;gap:6px}
    .share-input{flex:1;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 10px;color:#a5b4fc;font-family:monospace;font-size:.75rem;font-weight:700;outline:none;min-width:0}
    .copy-btn{background:#7c3aed;color:#fff;border:none;border-radius:7px;padding:7px 12px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.73rem;cursor:pointer;white-space:nowrap}
    .warn-note{font-size:.67rem;font-weight:700;color:#fbbf24;margin-top:7px;line-height:1.5;display:none}

    /* PREVIEW */
    .preview-outer{background:#1e1e3a;border-radius:16px;border:1px solid rgba(255,255,255,.07);overflow:hidden;display:flex;flex-direction:column}
    .preview-toolbar{background:#252545;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;flex-shrink:0}
    .preview-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.07em;color:#818cf8}
    .toolbar-btns{display:flex;gap:7px}
    .print-btn,.share-btn{border:none;border-radius:8px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.78rem;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;display:none}
    .print-btn{background:#16a34a;color:#fff}.print-btn:hover{background:#15803d}
    .share-btn{background:#7c3aed;color:#fff}.share-btn:hover{background:#6d28d9}
    #brochureFrame{width:100%;flex:1;border:none;background:#fff;min-height:700px}
    .frame-placeholder{display:flex;align-items:center;justify-content:center;min-height:400px;color:rgba(255,255,255,.2);flex-direction:column;gap:12px}
    .frame-placeholder .pi{font-size:3.5rem}
    .frame-placeholder .pt{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f0f23;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.92rem;padding:11px 26px;border-radius:60px;opacity:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .4s;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">← BACK</button>
  <div class="header-title">📄 PROPERTY BROCHURE</div>
</div>

<div class="main-wrap">

  <!-- LEFT PANEL -->
  <div style="display:flex;flex-direction:column;gap:14px">
    <div class="card">
      <div class="card-title">Select Property</div>
      <select class="prop-select" id="propSelect" onchange="onPropChange()">
        <option value="">— Choose a property —</option>
      </select>

      <!-- LAYOUT PICKER -->
      <div class="card-title" id="layoutTitle" style="display:none">Choose Layout</div>
      <div class="layout-grid" id="layoutGrid" style="display:none">
        <div class="layout-opt selected" data-layout="classic" onclick="selectLayout(this)">
          <div class="layout-preview" style="background:linear-gradient(135deg,#1400cc22,#818cf822)">
            <div style="height:60%;background:rgba(129,140,248,.2);margin:4px 4px 2px"></div>
            <div style="height:30%;background:rgba(255,255,255,.08);margin:0 4px"></div>
          </div>
          <div class="layout-name">Classic</div>
        </div>
        <div class="layout-opt" data-layout="modern" onclick="selectLayout(this)">
          <div class="layout-preview">
            <div style="display:grid;grid-template-columns:1fr 1fr;height:100%;gap:2px;padding:3px">
              <div style="background:rgba(129,140,248,.3);border-radius:3px;grid-row:1/3"></div>
              <div style="background:rgba(255,255,255,.1);border-radius:3px"></div>
              <div style="background:rgba(255,255,255,.06);border-radius:3px"></div>
            </div>
          </div>
          <div class="layout-name">Modern</div>
        </div>
        <div class="layout-opt" data-layout="luxury" onclick="selectLayout(this)">
          <div class="layout-preview" style="background:linear-gradient(135deg,#0a0a1a,#1e1e3a)">
            <div style="padding:4px;display:flex;flex-direction:column;gap:2px;height:100%">
              <div style="background:linear-gradient(90deg,#1400cc44,transparent);height:30%;border-radius:3px"></div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;flex:1">
                <div style="background:rgba(129,140,248,.2);border-radius:2px"></div>
                <div style="background:rgba(129,140,248,.15);border-radius:2px"></div>
                <div style="background:rgba(129,140,248,.1);border-radius:2px"></div>
              </div>
            </div>
          </div>
          <div class="layout-name">Luxury</div>
        </div>
        <div class="layout-opt" data-layout="minimal" onclick="selectLayout(this)">
          <div class="layout-preview">
            <div style="padding:4px">
              <div style="height:50%;background:rgba(255,255,255,.12);border-radius:3px;margin-bottom:3px"></div>
              <div style="height:4px;background:rgba(20,0,204,.4);border-radius:2px;margin-bottom:3px;width:40%"></div>
              <div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:2px"></div>
              <div style="height:3px;background:rgba(255,255,255,.04);border-radius:2px"></div>
            </div>
          </div>
          <div class="layout-name">Minimal</div>
        </div>
        <div class="layout-opt" data-layout="magazine" onclick="selectLayout(this)">
          <div class="layout-preview">
            <div style="display:grid;grid-template-rows:60% 40%;height:100%;gap:2px;padding:3px">
              <div style="display:grid;grid-template-columns:2fr 1fr;gap:2px">
                <div style="background:rgba(129,140,248,.25);border-radius:3px"></div>
                <div style="display:grid;grid-template-rows:1fr 1fr;gap:2px">
                  <div style="background:rgba(255,255,255,.1);border-radius:2px"></div>
                  <div style="background:rgba(255,255,255,.07);border-radius:2px"></div>
                </div>
              </div>
              <div style="background:rgba(255,255,255,.06);border-radius:3px"></div>
            </div>
          </div>
          <div class="layout-name">Magazine</div>
        </div>
        <div class="layout-opt" data-layout="dark" onclick="selectLayout(this)">
          <div class="layout-preview" style="background:#0a0a1a">
            <div style="padding:4px;height:100%;display:flex;flex-direction:column;gap:2px">
              <div style="height:55%;background:rgba(20,0,204,.4);border-radius:3px"></div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;flex:1">
                <div style="background:rgba(129,140,248,.2);border-radius:2px"></div>
                <div style="background:rgba(129,140,248,.1);border-radius:2px"></div>
              </div>
            </div>
          </div>
          <div class="layout-name">Dark</div>
        </div>
      </div>

      <!-- OPTIONS -->
      <div id="optionsArea" style="display:none">
        <div class="card-title">Options</div>
        <div class="options-grid">
          <label class="opt-chip checked" id="optPhotos">
            <input type="checkbox" checked onchange="this.closest('.opt-chip').classList.toggle('checked',this.checked);generateBrochure()"/> <span>📸 Photos</span>
          </label>
          <label class="opt-chip" id="optVideos">
            <input type="checkbox" onchange="this.closest('.opt-chip').classList.toggle('checked',this.checked);generateBrochure()"/> <span>🎥 Videos</span>
          </label>
          <label class="opt-chip checked" id="optAmenities">
            <input type="checkbox" checked onchange="this.closest('.opt-chip').classList.toggle('checked',this.checked);generateBrochure()"/> <span>✨ Amenities</span>
          </label>
          <label class="opt-chip checked" id="optContact">
            <input type="checkbox" checked onchange="this.closest('.opt-chip').classList.toggle('checked',this.checked);generateBrochure()"/> <span>📞 Contact</span>
          </label>
          <label class="opt-chip" id="optWatermark">
            <input type="checkbox" onchange="this.closest('.opt-chip').classList.toggle('checked',this.checked);generateBrochure()"/> <span>🏷 Watermark</span>
          </label>
          <label class="opt-chip checked" id="optMap">
            <input type="checkbox" checked onchange="this.closest('.opt-chip').classList.toggle('checked',this.checked);generateBrochure()"/> <span>📍 Location</span>
          </label>
        </div>
      </div>

      <button class="gen-btn" id="genBtn" onclick="generateBrochure()">📄 GENERATE BROCHURE</button>
    </div>

    <!-- SHARE BOX -->
    <div class="share-box" id="shareLinkBox">
      <div class="share-label">🔗 Shareable Link (no login)</div>
      <div class="share-row">
        <input type="text" class="share-input" id="shareLinkInput" readonly/>
        <button class="copy-btn" onclick="copyShareLink()">Copy</button>
      </div>
      <div class="warn-note" id="shareLocalWarn">
        ⚠️ You're on localhost. Replace <code>127.0.0.1:7777</code> with your Serveo URL.
      </div>
    </div>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-outer">
    <div class="preview-toolbar">
      <div class="preview-label">Live Preview</div>
      <div class="toolbar-btns">
        <button class="share-btn" id="shareBtnEl" onclick="generateShareLink()">🔗 Share</button>
        <button class="print-btn" id="printBtnEl" onclick="printBrochure()">🖨 Print / PDF</button>
      </div>
    </div>
    <div id="frameWrap">
      <div class="frame-placeholder">
        <div class="pi">📄</div>
        <div class="pt">Select a property to generate</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let _props=[], _selProp=null, _branding={}, _layout='classic';

  async function load() {
    try {
      const [pr,br] = await Promise.all([fetch('/get_properties'),fetch('/get_branding')]);
      _props    = await pr.json();
      _branding = await br.json();
    } catch {}
    const sel = document.getElementById('propSelect');
    sel.innerHTML = '<option value="">— Choose a property —</option>' +
      _props.map(p=>`<option value="${p.id}">${esc(p.title||p.id)} · ${esc(p.city||'')} · ${p.region||'UAE'}</option>`).join('');
    const urlId = new URLSearchParams(window.location.search).get('id');
    if (urlId) { sel.value=urlId; onPropChange(); }
  }

  function onPropChange() {
    const id = document.getElementById('propSelect').value;
    _selProp = _props.find(p=>p.id===id)||null;
    const show = !!_selProp;
    document.getElementById('layoutTitle').style.display  = show?'':'none';
    document.getElementById('layoutGrid').style.display   = show?'grid':'none';
    document.getElementById('optionsArea').style.display  = show?'':'none';
    document.getElementById('genBtn').style.display       = show?'block':'none';
    document.getElementById('printBtnEl').style.display   = 'none';
    document.getElementById('shareBtnEl').style.display   = 'none';
    document.getElementById('shareLinkBox').style.display = 'none';
    if (!show) { document.getElementById('frameWrap').innerHTML=`<div class="frame-placeholder"><div class="pi">📄</div><div class="pt">Select a property</div></div>`; return; }
    generateBrochure();
  }

  function selectLayout(el) {
    document.querySelectorAll('.layout-opt').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected');
    _layout = el.dataset.layout;
    generateBrochure();
  }

  function generateBrochure() {
    if (!_selProp) return;
    const p = _selProp;
    const showPhotos    = document.querySelector('#optPhotos input').checked;
    const showVideos    = document.querySelector('#optVideos input').checked;
    const showAmenities = document.querySelector('#optAmenities input').checked;
    const showContact   = document.querySelector('#optContact input').checked;
    const showWatermark = document.querySelector('#optWatermark input').checked;
    const showMap       = document.querySelector('#optMap input').checked;

    const company = (_branding.company_name||'SERENIA').replace(/</g,'&lt;');
    const primary = _branding.primary_color||'#1400cc';
    const logoSrc = _branding.logo_filename ? '/photos/'+encodeURIComponent(_branding.logo_filename) : '';
    const tagline = (_branding.tagline||'Real Estate').replace(/</g,'&lt;');

    const cur     = p.currency==='INR'?'₹':'AED';
    const saleP   = p.sale_price_aed||p.sale_price_inr||0;
    const rentP   = p.monthly_rent_aed||p.monthly_rent_inr||0;
    const fmt     = n => n ? Number(n).toLocaleString() : '';
    const safe    = s => s ? String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
    const photos  = p.photos||[];
    const videos  = p.videos||[];

    const logoHTML = logoSrc
      ? `<img src="${logoSrc}" style="height:44px;max-width:140px;object-fit:contain" onerror="this.style.display='none'">`
      : `<span style="font-size:22px;font-weight:900;letter-spacing:.1em;color:${primary}">${company}</span>`;

    // ── Photos HTML with lightbox ──
    const lightboxCSS = `
      .lb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;cursor:pointer}
      .lb-overlay.open{display:flex}
      .lb-img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.8)}
      .lb-close{position:fixed;top:20px;right:24px;color:#fff;font-size:2rem;cursor:pointer;font-weight:900;line-height:1;opacity:.7}
      .lb-close:hover{opacity:1}
      .lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:2.5rem;cursor:pointer;font-weight:900;padding:10px 18px;background:rgba(255,255,255,.1);border-radius:8px;opacity:.7;user-select:none}
      .lb-prev:hover,.lb-next:hover{opacity:1;background:rgba(255,255,255,.2)}
      .lb-prev{left:12px}.lb-next{right:12px}
      .lb-counter{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:13px;font-weight:700;font-family:Arial,sans-serif}
      .photo-thumb{cursor:pointer;transition:transform .18s,box-shadow .18s}
      .photo-thumb:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(0,0,0,.35)}
    `;

    const lightboxHTML = `
      <div class="lb-overlay" id="lb" onclick="closeLB(event)">
        <span class="lb-close" onclick="closeLB()">✕</span>
        <span class="lb-prev" onclick="event.stopPropagation();moveLB(-1)">‹</span>
        <img class="lb-img" id="lbImg" src=""/>
        <span class="lb-next" onclick="event.stopPropagation();moveLB(1)">›</span>
        <div class="lb-counter" id="lbCounter"></div>
      </div>`;

    const lightboxJS = `
      var _lbPhotos=${JSON.stringify(photos)}, _lbIdx=0;
      function openLB(idx){_lbIdx=idx;var lb=document.getElementById('lb');lb.classList.add('open');updateLB();}
      function closeLB(e){if(!e||e.target===document.getElementById('lb')||e.target.classList.contains('lb-close')){document.getElementById('lb').classList.remove('open');}}
      function moveLB(d){_lbIdx=(_lbIdx+d+_lbPhotos.length)%_lbPhotos.length;updateLB();}
      function updateLB(){document.getElementById('lbImg').src='/photos/'+_lbPhotos[_lbIdx];document.getElementById('lbCounter').textContent=(_lbIdx+1)+' / '+_lbPhotos.length;}
      document.addEventListener('keydown',function(e){var lb=document.getElementById('lb');if(!lb.classList.contains('open'))return;if(e.key==='ArrowLeft')moveLB(-1);if(e.key==='ArrowRight')moveLB(1);if(e.key==='Escape')lb.classList.remove('open');});
    `;

    // ── Build layout-specific HTML ──
    const buildPhotosSection = (layout) => {
      if (!showPhotos || !photos.length) return '';
      if (layout === 'classic') {
        return `<div style="margin-bottom:20px">
          <img class="photo-thumb" src="/photos/${photos[0]}" onclick="openLB(0)" style="width:100%;height:280px;object-fit:cover;border-radius:10px;display:block;margin-bottom:6px" onerror="this.style.display='none'"/>
          ${photos.length>1?`<div style="display:grid;grid-template-columns:repeat(${Math.min(photos.length-1,4)},1fr);gap:5px">
            ${photos.slice(1,5).map((ph,i)=>`<img class="photo-thumb" src="/photos/${ph}" onclick="openLB(${i+1})" style="width:100%;height:90px;object-fit:cover;border-radius:7px" onerror="this.style.display='none'"/>`).join('')}
          </div>` : ''}
        </div>`;
      }
      if (layout === 'magazine') {
        return `<div style="display:grid;grid-template-columns:2fr 1fr;grid-template-rows:200px 120px;gap:6px;margin-bottom:20px">
          <img class="photo-thumb" src="/photos/${photos[0]}" onclick="openLB(0)" style="width:100%;height:100%;object-fit:cover;border-radius:8px;grid-row:1/3" onerror="this.style.display='none'"/>
          ${photos.slice(1,3).map((ph,i)=>`<img class="photo-thumb" src="/photos/${ph}" onclick="openLB(${i+1})" style="width:100%;height:100%;object-fit:cover;border-radius:8px" onerror="this.style.display='none'"/>`).join('')}
        </div>`;
      }
      if (layout === 'modern') {
        return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:20px">
          ${photos.slice(0,4).map((ph,i)=>`<img class="photo-thumb" src="/photos/${ph}" onclick="openLB(${i})" style="width:100%;height:${i===0?'200px':'150px'};object-fit:cover;border-radius:8px;${i===0?'grid-column:1/3':''}" onerror="this.style.display='none'"/>`).join('')}
        </div>`;
      }
      // luxury, minimal, dark — hero + strip
      return `<div style="margin-bottom:18px">
        <img class="photo-thumb" src="/photos/${photos[0]}" onclick="openLB(0)" style="width:100%;height:300px;object-fit:cover;border-radius:10px;display:block;margin-bottom:5px" onerror="this.style.display='none'"/>
        ${photos.length>1?`<div style="display:flex;gap:4px;overflow:hidden">
          ${photos.slice(1,6).map((ph,i)=>`<img class="photo-thumb" src="/photos/${ph}" onclick="openLB(${i+1})" style="width:${100/Math.min(photos.length-1,5)}%;height:70px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'"/>`).join('')}
        </div>`:''}
      </div>`;
    };

    const videosHTML = (showVideos && videos.length) ? `
      <div style="margin-bottom:20px">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:8px;border-bottom:1px solid #f0ebff;padding-bottom:5px">🎥 Video Tours</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${videos.slice(0,3).map((v,i)=>`
            <video controls style="width:100%;max-height:220px;border-radius:8px;background:#000;display:block" onerror="this.style.display='none'">
              <source src="/videos/${v}" type="video/mp4"/>
              <source src="/videos/${v}" type="video/webm"/>
              Your browser does not support video.
            </video>`).join('')}
        </div>
      </div>` : '';

    const specsHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px">
        ${[
          p.bedrooms    ?['🛏','Bedrooms',p.bedrooms]:null,
          p.bathrooms   ?['🚿','Bathrooms',p.bathrooms]:null,
          p.area_sqft   ?['📐','Area',fmt(p.area_sqft)+' sqft']:null,
          p.property_type?['🏢','Type',p.property_type]:null,
          p.floor       ?['🏗','Floor',p.floor]:null,
          p.region||'UAE'?['🌍','Region',p.region||'UAE']:null,
        ].filter(Boolean).map(([icon,label,val])=>`
          <div style="border:1.5px solid #e8e0f0;border-radius:9px;padding:10px;text-align:center">
            <div style="font-size:18px;margin-bottom:3px">${icon}</div>
            <div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">${label}</div>
            <div style="font-size:13px;font-weight:800;color:#1a1a2e">${safe(val)}</div>
          </div>`).join('')}
      </div>`;

    const priceHTML = (saleP||rentP) ? `
      <div style="display:grid;grid-template-columns:${saleP&&rentP?'1fr 1fr':'1fr'};gap:10px;margin-bottom:20px">
        ${saleP?`<div style="background:${primary};color:#fff;border-radius:10px;padding:16px;text-align:center">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;opacity:.8;margin-bottom:4px">Sale Price</div>
          <div style="font-size:22px;font-weight:900">${cur} ${fmt(saleP)}</div>
        </div>`:''}
        ${rentP?`<div style="background:#0a7c3e;color:#fff;border-radius:10px;padding:16px;text-align:center">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;opacity:.8;margin-bottom:4px">Monthly Rent</div>
          <div style="font-size:22px;font-weight:900">${cur} ${fmt(rentP)}</div>
        </div>`:''}
      </div>` : '';

    const amenHTML = showAmenities && p.amenities?.length ? `
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:8px;border-bottom:1px solid #f0ebff;padding-bottom:5px">Amenities</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${p.amenities.map(a=>`<span style="background:#f4f0ff;border:1px solid #e0d8ff;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;color:#555">${safe(a)}</span>`).join('')}
        </div>
      </div>` : '';

    const contactHTML = showContact ? `
      <div style="background:#f8f5ff;border:1.5px solid #e0d8ff;border-radius:10px;padding:14px 16px;margin-top:18px">
        <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:7px">Contact</div>
        <div style="font-size:14px;font-weight:800;color:#1a1a2e;margin-bottom:3px">${p.seller_name?safe(p.seller_name):company}</div>
        ${(p.seller_phone||_branding.phone)?`<div style="font-size:12px;color:#555;margin-bottom:2px">📞 ${safe(p.seller_phone||_branding.phone)}</div>`:''}
        ${_branding.email?`<div style="font-size:12px;color:#555;margin-bottom:2px">✉️ ${safe(_branding.email)}</div>`:''}
        ${_branding.address?`<div style="font-size:11px;color:#888">📍 ${safe(_branding.address)}</div>`:''}
      </div>` : '';

    const mapHTML = showMap && p.lat && p.lng ? `
      <div style="margin-top:18px">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:8px;border-bottom:1px solid #f0ebff;padding-bottom:5px">📍 Location</div>
        <iframe
          src="https://www.openstreetmap.org/export/embed.html?bbox=${+p.lng-.005},${+p.lat-.005},${+p.lng+.005},${+p.lat+.005}&layer=mapnik&marker=${p.lat},${p.lng}"
          style="width:100%;height:180px;border:none;border-radius:8px;border:1.5px solid #e0d8ff"
          loading="lazy"></iframe>
      </div>` : '';

    const watermarkHTML = showWatermark ? `
      <div style="position:fixed;bottom:28px;right:28px;opacity:.07;font-size:36px;font-weight:900;color:${primary};letter-spacing:.12em;pointer-events:none;transform:rotate(-20deg);white-space:nowrap;font-family:Arial,sans-serif">${company}</div>
      ${logoSrc?`<div style="position:fixed;top:18px;right:18px;opacity:.06;pointer-events:none"><img src="${logoSrc}" style="height:50px;object-fit:contain" onerror="this.style.display='none'"/></div>`:''}`
      : '';

    // ── LAYOUT THEMES ──
    const themes = {
      classic: { bodyBg:'#fff', headerBg:primary, headerText:'#fff', borderColor:'#e8e0f0', accentColor:primary },
      modern:  { bodyBg:'#fafafa', headerBg:'#fff', headerText:primary, borderColor:'#e0e0e0', accentColor:primary },
      luxury:  { bodyBg:'#0f0f1e', headerBg:'linear-gradient(135deg,#1a0040,#0a0a2e)', headerText:'#fff', borderColor:'rgba(129,140,248,.2)', accentColor:'#818cf8', textColor:'#e2e8f0', subColor:'rgba(255,255,255,.5)' },
      minimal: { bodyBg:'#fff', headerBg:'#fff', headerText:'#1a1a2e', borderColor:'#f0f0f0', accentColor:primary },
      magazine:{ bodyBg:'#fff', headerBg:'#1a1a2e', headerText:'#fff', borderColor:'#e8e0f0', accentColor:primary },
      dark:    { bodyBg:'#111122', headerBg:'#1400cc', headerText:'#fff', borderColor:'rgba(255,255,255,.12)', accentColor:'#818cf8', textColor:'#e2e8f0', subColor:'rgba(255,255,255,.5)' },
    };
    const theme = themes[_layout]||themes.classic;
    const isDark = _layout==='luxury'||_layout==='dark';
    const textCol   = isDark ? (theme.textColor||'#e2e8f0') : '#1a1a2e';
    const subCol    = isDark ? (theme.subColor||'rgba(255,255,255,.5)') : '#888';
    const cardBg    = isDark ? 'rgba(255,255,255,.05)' : '#f9f7ff';
    const cardBorder= isDark ? theme.borderColor : '#e8e0ff';

    const isHeaderGradient = theme.headerBg.includes('gradient');

    const html = `<!DOCTYPE html><html><head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width,initial-scale=1"/>
      <title>${safe(p.title||'Property Brochure')}</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,Helvetica,sans-serif;background:${theme.bodyBg};color:${textCol};padding:32px;max-width:820px;margin:0 auto;font-size:13px}
        @media print{body{padding:12px;max-width:100%}.no-print{display:none!important}}
        ${lightboxCSS}
      </style>
    </head><body>

    ${lightboxHTML}

    <!-- HEADER -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;padding:16px 20px;background:${isHeaderGradient?'linear-gradient(135deg,#1a0040,#0a0a2e)':theme.headerBg};border-radius:12px;${_layout==='minimal'?'background:none;padding:0 0 14px 0;border-bottom:2.5px solid '+primary+';border-radius:0;margin-bottom:18px':''}">
      <div>
        ${logoSrc?`<img src="${logoSrc}" style="height:42px;max-width:130px;object-fit:contain;margin-bottom:6px;display:block" onerror="this.style.display='none'"/>`:''}
        <div style="font-size:${isDark||_layout==='magazine'?'22px':'18px'};font-weight:900;letter-spacing:.08em;color:${_layout==='minimal'?primary:theme.headerText};${isDark||_layout==='magazine'?'':'margin-top:4px'}">${company}</div>
        <div style="font-size:11px;font-weight:600;color:${isDark||_layout==='magazine'?'rgba(255,255,255,.6)':subCol};margin-top:3px">${tagline}</div>
      </div>
      <div style="text-align:right">
        <div style="background:${isDark?'rgba(129,140,248,.25)':primary+'22'};color:${isDark?'#a5b4fc':primary};border-radius:5px;padding:3px 10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">#${safe(p.id)}</div>
        ${p.category?`<div style="background:${isDark?'rgba(255,255,255,.08)':'#f4f4f8'};color:${subCol};border-radius:5px;padding:3px 10px;font-size:10px;font-weight:800;text-transform:uppercase">${safe(p.category)}</div>`:''}
        ${p.availability&&p.availability!=='Available'?`<div style="margin-top:4px;background:#fee2e2;color:#dc2626;border-radius:5px;padding:3px 10px;font-size:10px;font-weight:900;text-transform:uppercase">${safe(p.availability)}</div>`:''}
      </div>
    </div>

    <!-- TITLE -->
    <h1 style="font-size:28px;font-weight:900;color:${textCol};margin-bottom:5px;line-height:1.1;letter-spacing:-.3px">${safe(p.title||'Untitled Property')}</h1>
    <div style="font-size:13px;font-weight:600;color:${subCol};margin-bottom:20px">📍 ${safe([p.address,p.city,p.state].filter(Boolean).join(', ')||'—')}</div>

    ${buildPhotosSection(_layout)}
    ${priceHTML}
    ${specsHTML}
    ${videosHTML}
    ${p.description?`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:${subCol};margin-bottom:8px;border-bottom:1px solid ${cardBorder};padding-bottom:5px">Description</div><p style="font-size:13px;font-weight:600;color:${isDark?'rgba(255,255,255,.65)':'#444'};line-height:1.75">${safe(p.description)}</p></div>`:''}
    ${amenHTML}
    ${mapHTML}
    ${contactHTML}

    <!-- FOOTER -->
    <div style="margin-top:28px;padding-top:11px;border-top:1px solid ${cardBorder};display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:${isDark?'rgba(255,255,255,.3)':'#bbb'}">
      <span>${company} · ${new Date().toLocaleDateString()}</span>
      <span>Ref: ${safe(p.id)}</span>
    </div>

    ${watermarkHTML}

    <script>
      ${lightboxJS}
    ${'<'}/script>
    </body></html>`;

    const fw = document.getElementById('frameWrap');
    fw.innerHTML = '<iframe id="brochureFrame" style="width:100%;border:none;background:#fff;min-height:700px"></iframe>';
    document.getElementById('brochureFrame').srcdoc = html;
    document.getElementById('printBtnEl').style.display = 'block';
    document.getElementById('shareBtnEl').style.display = 'block';
  }

  function printBrochure() {
    const f = document.getElementById('brochureFrame');
    if (f?.contentWindow) f.contentWindow.print();
    else showToast('❌ Generate the brochure first');
  }

  async function generateShareLink() {
    if (!_selProp) return;
    try {
      const res  = await fetch('/get_brochure_token/'+_selProp.id);
      const json = await res.json();
      if (!json.token) { showToast('❌ Failed to generate link'); return; }
      const url  = window.location.origin+'/brochure_public?id='+_selProp.id+'&token='+json.token;
      document.getElementById('shareLinkInput').value = url;
      document.getElementById('shareLinkBox').style.display = 'block';
      const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
      document.getElementById('shareLocalWarn').style.display = isLocal ? 'block' : 'none';
      showToast('🔗 Share link ready!');
    } catch { showToast('❌ Server error'); }
  }

  function copyShareLink() {
    const inp = document.getElementById('shareLinkInput');
    inp.select();
    try { document.execCommand('copy'); showToast('📋 Copied!'); } catch { showToast('Select link manually'); }
  }

  function showToast(m,d=3000){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

  load();
</script>
<script src="branding-loader.js"></script>
</body>
</html>

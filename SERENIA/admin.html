<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100vh;font-family:'Nunito',sans-serif;background:#0f0f23;color:#e2e8f0}

    .header{background:#1400cc;display:flex;align-items:center;gap:16px;padding:16px 32px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(20,0,204,.35)}
    .back-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;letter-spacing:.07em;text-transform:uppercase;padding:9px 18px;border-radius:10px;cursor:pointer;transition:background .2s}
    .back-btn:hover{background:rgba(255,255,255,.25)}
    .header h1{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#fff;letter-spacing:.07em;flex:1}
    .logout-btn{background:rgba(220,38,38,.2);border:1.5px solid rgba(220,38,38,.4);color:#f87171;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;padding:9px 18px;border-radius:10px;cursor:pointer;transition:background .2s}
    .logout-btn:hover{background:rgba(220,38,38,.35)}

    .body-wrap{max-width:900px;margin:0 auto;padding:36px 28px 80px;display:flex;flex-direction:column;gap:28px}

    /* ADD USER CARD */
    .card{background:#1e1e3a;border-radius:20px;padding:28px 32px;border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .card h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;color:#818cf8;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07)}

    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group.full{grid-column:1/-1}
    .form-group label{color:rgba(255,255,255,.45);font-size:.72rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
    .form-group input,.form-group select{
      background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);
      border-radius:12px;padding:11px 16px;
      color:#fff;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;
      outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none;
    }
    .form-group input::placeholder{color:rgba(255,255,255,.2)}
    .form-group input:focus,.form-group select:focus{border-color:#818cf8}
    .form-group select option{background:#1e1e3a;color:#fff}

    .add-btn{
      margin-top:16px;
      background:#1400cc;color:#fff;border:none;border-radius:12px;
      padding:13px 36px;font-family:'Nunito',sans-serif;font-weight:900;
      font-size:1rem;letter-spacing:.07em;text-transform:uppercase;
      cursor:pointer;transition:background .2s,transform .15s;
    }
    .add-btn:hover{background:#2c14ff;transform:translateY(-2px)}
    .add-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* USERS TABLE */
    .users-table{width:100%;border-collapse:collapse}
    .users-table th{
      text-align:left;padding:10px 16px;
      font-size:.72rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
      color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.08);
    }
    .users-table td{
      padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05);
      font-size:.9rem;font-weight:700;
    }
    .users-table tr:last-child td{border-bottom:none}
    .users-table tr:hover td{background:rgba(255,255,255,.03)}

    .role-badge{
      display:inline-block;font-size:.72rem;font-weight:900;
      letter-spacing:.07em;text-transform:uppercase;
      padding:4px 12px;border-radius:6px;
    }
    .role-badge.admin{background:rgba(220,38,38,.2);color:#f87171;border:1px solid rgba(220,38,38,.3)}
    .role-badge.manager{background:rgba(234,179,8,.15);color:#fbbf24;border:1px solid rgba(234,179,8,.25)}
    .role-badge.agent{background:rgba(129,140,248,.15);color:#818cf8;border:1px solid rgba(129,140,248,.25)}

    .del-btn{
      background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.25);
      color:#f87171;border-radius:8px;padding:5px 14px;
      font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;
      cursor:pointer;transition:background .2s;
    }
    .del-btn:hover{background:rgba(220,38,38,.3)}
    .del-btn:disabled{opacity:.4;cursor:not-allowed}

    .pw-reset-btn{
      background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.2);
      color:#818cf8;border-radius:8px;padding:5px 14px;
      font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;
      cursor:pointer;transition:background .2s;margin-right:6px;
    }
    .pw-reset-btn:hover{background:rgba(129,140,248,.2)}

    .empty-row td{text-align:center;color:rgba(255,255,255,.25);padding:32px;font-weight:700}

    /* TOAST */
    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f0f23;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:14px 32px;border-radius:60px;box-shadow:0 8px 28px rgba(0,0,0,.5);transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* RESET PW MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#1e1e3a;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 32px;min-width:320px;box-shadow:0 12px 48px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:14px}
    .modal-box h3{color:#818cf8;font-weight:900;font-size:1.1rem;text-transform:uppercase}
    .modal-box input{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:11px 16px;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;outline:none;color:#fff}
    .modal-box input:focus{border-color:#818cf8}
    .modal-btns{display:flex;gap:10px}
    .modal-btns button{flex:1;border:none;border-radius:50px;padding:11px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;cursor:pointer}
    .modal-btns .confirm{background:#1400cc;color:#fff}
    .modal-btns .cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='/home'">← BACK</button>
  <h1>USER MANAGEMENT</h1>
  <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
</div>

<div class="body-wrap">

  <!-- ADD USER -->
  <div class="card">
    <h2>Add New User</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="newName" placeholder="e.g. Harshil Shah"/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="newUsername" placeholder="e.g. harshil" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="newPassword" placeholder="Min 6 characters" autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="newRole">
          <option value="agent">Agent</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="addUser()">+ ADD USER</button>
  </div>

  <!-- USERS LIST -->
  <div class="card">
    <h2>All Users</h2>
    <table class="users-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Username</th>
          <th>Role</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr class="empty-row"><td colspan="5">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<div id="toast"></div>

<!-- Reset Password Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <h3>Reset Password</h3>
    <input type="password" id="resetPwInput" placeholder="New password (min 6 chars)…"/>
    <div class="modal-btns">
      <button class="cancel" onclick="document.getElementById('resetModal').classList.remove('open')">Cancel</button>
      <button class="confirm" onclick="confirmReset()">Save</button>
    </div>
  </div>
</div>

<script>
  let _resetUserId = null;

  async function loadUsers() {
    try {
      const res   = await fetch('/get_users');
      const users = await res.json();
      renderUsers(users);
    } catch {
      document.getElementById('usersTableBody').innerHTML =
        '<tr class="empty-row"><td colspan="5">Could not load users</td></tr>';
    }
  }

  function renderUsers(users) {
    const tbody = document.getElementById('usersTableBody');
    if (!users.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No users yet</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>${esc(u.name)}</td>
        <td style="color:rgba(255,255,255,.6)">${esc(u.username)}</td>
        <td><span class="role-badge ${u.role}">${u.role.toUpperCase()}</span></td>
        <td style="color:rgba(255,255,255,.4);font-size:.82rem">${esc(u.created_at||'')}</td>
        <td>
          <button class="pw-reset-btn" onclick="openReset('${u.id}')">Reset PW</button>
          ${u.role !== 'admin' ? `<button class="del-btn" onclick="deleteUser('${u.id}')">Delete</button>` : '<span style="color:rgba(255,255,255,.2);font-size:.8rem">Protected</span>'}
        </td>
      </tr>`).join('');
  }

  async function addUser() {
    const name     = document.getElementById('newName').value.trim();
    const username = document.getElementById('newUsername').value.trim().toLowerCase();
    const password = document.getElementById('newPassword').value;
    const role     = document.getElementById('newRole').value;

    if (!name)           { showToast('⚠️ Enter full name');           return; }
    if (!username)       { showToast('⚠️ Enter username');            return; }
    if (password.length < 6) { showToast('⚠️ Password min 6 chars'); return; }

    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = 'ADDING…';

    try {
      const res  = await fetch('/add_user', {
        method:  'POST',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify({name, username, password, role}),
      });
      const json = await res.json();
      if (json.success) {
        showToast('✅ User added!');
        document.getElementById('newName').value     = '';
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('newRole').value     = 'agent';
        loadUsers();
      } else {
        showToast('❌ ' + (json.error || 'Error'));
      }
    } catch { showToast('❌ Server error'); }
    finally  { btn.disabled=false; btn.textContent='+ ADD USER'; }
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    try {
      const res  = await fetch(`/delete_user/${id}`, {method:'DELETE'});
      const json = await res.json();
      if (json.success) { showToast('✅ User deleted'); loadUsers(); }
      else showToast('❌ ' + (json.error||'Error'));
    } catch { showToast('❌ Server error'); }
  }

  function openReset(id) {
    _resetUserId = id;
    document.getElementById('resetPwInput').value = '';
    document.getElementById('resetModal').classList.add('open');
  }
  async function confirmReset() {
    const pw = document.getElementById('resetPwInput').value;
    if (pw.length < 6) { showToast('⚠️ Min 6 characters'); return; }
    try {
      const res  = await fetch(`/reset_password/${_resetUserId}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({password: pw}),
      });
      const json = await res.json();
      if (json.success) { showToast('✅ Password reset!'); document.getElementById('resetModal').classList.remove('open'); }
      else showToast('❌ ' + (json.error||'Error'));
    } catch { showToast('❌ Server error'); }
  }

  async function doLogout() {
    await fetch('/logout', {method:'POST'});
    window.location.href = '/';
  }

  function showToast(msg, dur=3500) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

  loadUsers();
</script>
</body>
</html>

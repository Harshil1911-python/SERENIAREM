<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100vh;font-family:'Nunito',sans-serif;background:#0a0a1a;color:#e2e8f0}

    .header{background:#1400cc;display:flex;align-items:center;gap:14px;padding:13px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(20,0,204,.4)}
    .back-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.07em;text-transform:uppercase;padding:7px 16px;border-radius:9px;cursor:pointer;transition:background .2s}
    .back-btn:hover{background:rgba(255,255,255,.25)}
    .header-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;letter-spacing:.07em;flex:1}
    .add-btn-h{background:#fff;color:#1400cc;font-family:'Nunito',sans-serif;font-weight:900;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;border-radius:9px;border:none;cursor:pointer;transition:all .2s}
    .add-btn-h:hover{background:#e8e0ff}

    /* FILTER BAR */
    .filter-bar{background:#0f0f23;border-bottom:1px solid rgba(255,255,255,.06);padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .fchip{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;padding:5px 14px;border-radius:7px;cursor:pointer;transition:all .18s}
    .fchip:hover{color:#fff;border-color:rgba(255,255,255,.25)}
    .fchip.active{background:#1400cc;border-color:#1400cc;color:#fff}
    .fsearch{flex:1;max-width:260px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:7px 14px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;outline:none}
    .fsearch::placeholder{color:rgba(255,255,255,.2)}
    .fsearch:focus{border-color:#818cf8}

    /* STATS */
    .stats-row{display:flex;gap:0;background:#0f0f23;border-bottom:1px solid rgba(255,255,255,.06)}
    .stat-pill{flex:1;text-align:center;padding:10px 8px;border-right:1px solid rgba(255,255,255,.06)}
    .stat-pill:last-child{border-right:none}
    .sp-val{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;line-height:1}
    .sp-label{font-size:.62rem;font-weight:900;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.07em}

    /* TASK LIST */
    .wrap{max-width:820px;margin:0 auto;padding:20px 20px 80px;display:flex;flex-direction:column;gap:10px}

    .task-card{background:#1e1e3a;border-radius:14px;padding:16px 18px;border:1.5px solid rgba(255,255,255,.06);display:flex;align-items:flex-start;gap:14px;transition:all .2s;cursor:default}
    .task-card:hover{border-color:rgba(129,140,248,.25);background:#22224a}
    .task-card.done{opacity:.5}
    .task-card.overdue{border-left:3px solid #f87171}
    .task-card.due-soon{border-left:3px solid #fbbf24}

    .task-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
    .task-check:hover{border-color:#818cf8}
    .task-check.checked{background:#16a34a;border-color:#16a34a}
    .task-check.checked::after{content:'✓';color:#fff;font-size:.75rem;font-weight:900}

    .task-body{flex:1;min-width:0}
    .task-title{font-weight:800;font-size:.95rem;color:#fff;margin-bottom:4px;line-height:1.3}
    .task-card.done .task-title{text-decoration:line-through;color:rgba(255,255,255,.35)}
    .task-desc{font-size:.8rem;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:8px;line-height:1.5}
    .task-tags{display:flex;flex-wrap:wrap;gap:5px}
    .task-tag{font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
    .task-tag.priority-high{background:rgba(248,113,113,.2);color:#f87171}
    .task-tag.priority-medium{background:rgba(251,191,36,.15);color:#fbbf24}
    .task-tag.priority-low{background:rgba(74,222,128,.12);color:#4ade80}
    .task-tag.category{background:rgba(129,140,248,.12);color:#818cf8}
    .task-tag.linked{background:rgba(34,211,238,.1);color:#22d3ee}

    .task-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
    .task-due{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:6px}
    .task-due.overdue{background:rgba(248,113,113,.2);color:#f87171}
    .task-due.today{background:rgba(251,191,36,.2);color:#fbbf24}
    .task-due.upcoming{background:rgba(129,140,248,.12);color:#818cf8}
    .task-due.done{background:rgba(74,222,128,.12);color:#4ade80}
    .task-actions{display:flex;gap:5px}
    .task-action{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.45);font-family:'Nunito',sans-serif;font-weight:800;font-size:.7rem;padding:4px 9px;cursor:pointer;transition:all .2s}
    .task-action:hover{background:rgba(255,255,255,.13);color:#fff}
    .task-action.del:hover{background:rgba(220,38,38,.2);border-color:rgba(220,38,38,.3);color:#f87171}

    /* EMPTY */
    .empty{text-align:center;padding:60px;color:rgba(255,255,255,.2);font-weight:800;letter-spacing:.06em;text-transform:uppercase}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal-box{background:#1e1e3a;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 32px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.6)}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.06em;color:#fff;margin-bottom:20px}
    .field{margin-bottom:14px}
    .field label{display:block;color:rgba(255,255,255,.45);font-size:.7rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;outline:none;transition:border-color .2s;appearance:none;resize:vertical}
    .field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.2)}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:#818cf8}
    .field select option{background:#1e1e3a;color:#fff}
    .field textarea{min-height:60px}
    .form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .modal-btns{display:flex;gap:10px;margin-top:8px}
    .modal-btns button{flex:1;border:none;border-radius:10px;padding:12px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;cursor:pointer}
    .btn-save{background:#1400cc;color:#fff}
    .btn-save:hover{background:#2c14ff}
    .btn-cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}

    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f0f23;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:14px 28px;border-radius:60px;box-shadow:0 8px 28px rgba(0,0,0,.5);transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location.href='home.html'">← BACK</button>
  <div class="header-title">✅ TASKS & REMINDERS</div>
  <button class="add-btn-h" onclick="openAdd()">+ NEW TASK</button>
</div>

<div class="stats-row">
  <div class="stat-pill"><div class="sp-val" id="sAll">—</div><div class="sp-label">Total</div></div>
  <div class="stat-pill"><div class="sp-val" style="color:#f87171" id="sOverdue">—</div><div class="sp-label">Overdue</div></div>
  <div class="stat-pill"><div class="sp-val" style="color:#fbbf24" id="sToday">—</div><div class="sp-label">Due Today</div></div>
  <div class="stat-pill"><div class="sp-val" style="color:#818cf8" id="sUpcoming">—</div><div class="sp-label">Upcoming</div></div>
  <div class="stat-pill"><div class="sp-val" style="color:#4ade80" id="sDone">—</div><div class="sp-label">Done</div></div>
</div>

<div class="filter-bar">
  <button class="fchip active" onclick="setFilter('all',this)">All</button>
  <button class="fchip" onclick="setFilter('pending',this)">Pending</button>
  <button class="fchip" onclick="setFilter('overdue',this)">Overdue</button>
  <button class="fchip" onclick="setFilter('today',this)">Today</button>
  <button class="fchip" onclick="setFilter('done',this)">Done</button>
  <input type="text" class="fsearch" id="fsearch" placeholder="🔍 Search tasks…" oninput="render()"/>
</div>

<div class="wrap" id="wrap"><div class="empty">Loading…</div></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">New Task</div>
    <input type="hidden" id="editId"/>
    <div class="field"><label>Task Title *</label><input type="text" id="tTitle" placeholder="e.g. Follow up with buyer…"/></div>
    <div class="field"><label>Description</label><textarea id="tDesc" placeholder="Details, notes…"></textarea></div>
    <div class="form-2">
      <div class="field"><label>Priority</label>
        <select id="tPriority">
          <option>High</option><option selected>Medium</option><option>Low</option>
        </select>
      </div>
      <div class="field"><label>Category</label>
        <select id="tCategory">
          <option>General</option><option>Follow Up</option><option>Documentation</option>
          <option>Viewing</option><option>Payment</option><option>Legal</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-2">
      <div class="field"><label>Due Date</label><input type="date" id="tDue"/></div>
      <div class="field"><label>Due Time</label><input type="time" id="tTime"/></div>
    </div>
    <div class="field"><label>Linked To (optional)</label><input type="text" id="tLinked" placeholder="e.g. Property: Marina Heights, Deal #AB12…"/></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let _tasks = [], _filter = 'all';
  const today = new Date().toISOString().slice(0,10);

  function dueStatus(t) {
    if (t.status === 'Done') return 'done';
    if (!t.due_date) return 'upcoming';
    if (t.due_date < today) return 'overdue';
    if (t.due_date === today) return 'today';
    return 'upcoming';
  }

  async function load() {
    try {
      const res = await fetch('/get_tasks');
      _tasks = await res.json();
      updateStats();
      render();
    } catch { document.getElementById('wrap').innerHTML = '<div class="empty">Failed to load</div>'; }
  }

  function updateStats() {
    document.getElementById('sAll').textContent     = _tasks.length;
    document.getElementById('sOverdue').textContent = _tasks.filter(t=>dueStatus(t)==='overdue').length;
    document.getElementById('sToday').textContent   = _tasks.filter(t=>dueStatus(t)==='today').length;
    document.getElementById('sUpcoming').textContent= _tasks.filter(t=>dueStatus(t)==='upcoming').length;
    document.getElementById('sDone').textContent    = _tasks.filter(t=>t.status==='Done').length;
  }

  function setFilter(f, btn) {
    _filter = f;
    document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const q = document.getElementById('fsearch').value.trim().toLowerCase();
    let list = _tasks.filter(t => {
      const s = dueStatus(t);
      if (_filter === 'pending'  && t.status === 'Done') return false;
      if (_filter === 'overdue'  && s !== 'overdue')     return false;
      if (_filter === 'today'    && s !== 'today')       return false;
      if (_filter === 'done'     && t.status !== 'Done') return false;
      if (q && ![t.title,t.description,t.category,t.linked_to].join(' ').toLowerCase().includes(q)) return false;
      return true;
    });

    // Sort: overdue first, then today, then upcoming, done last
    const order = {overdue:0,today:1,upcoming:2,done:3};
    list.sort((a,b) => order[dueStatus(a)] - order[dueStatus(b)] || (a.due_date||'').localeCompare(b.due_date||''));

    const wrap = document.getElementById('wrap');
    if (!list.length) { wrap.innerHTML = '<div class="empty">No tasks found</div>'; return; }

    wrap.innerHTML = list.map(t => {
      const s = dueStatus(t);
      const dueLabel = !t.due_date ? '' : s === 'overdue' ? `OVERDUE · ${t.due_date}` : s === 'today' ? 'DUE TODAY' : t.due_date;
      return `
        <div class="task-card ${s === 'overdue'&&t.status!=='Done'?'overdue':''} ${s==='today'&&t.status!=='Done'?'due-soon':''} ${t.status==='Done'?'done':''}">
          <div class="task-check ${t.status==='Done'?'checked':''}" onclick="toggleDone('${t.id}',${t.status==='Done'})" title="${t.status==='Done'?'Mark pending':'Mark done'}"></div>
          <div class="task-body">
            <div class="task-title">${esc(t.title)}</div>
            ${t.description?`<div class="task-desc">${esc(t.description)}</div>`:''}
            <div class="task-tags">
              <span class="task-tag priority-${(t.priority||'medium').toLowerCase()}">${t.priority||'Medium'}</span>
              ${t.category?`<span class="task-tag category">${esc(t.category)}</span>`:''}
              ${t.linked_to?`<span class="task-tag linked">📎 ${esc(t.linked_to)}</span>`:''}
            </div>
          </div>
          <div class="task-right">
            ${dueLabel?`<span class="task-due ${s}">${dueLabel}${t.due_time?' · '+t.due_time:''}</span>`:''}
            <div class="task-actions">
              <button class="task-action" onclick="openEdit('${t.id}')">✏️</button>
              <button class="task-action del" onclick="deleteTask('${t.id}')">✕</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function toggleDone(id, wasDone) {
    try {
      const res  = wasDone
        ? await fetch(`/update_task/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'Pending'})})
        : await fetch(`/complete_task/${id}`, {method:'POST'});
      const json = await res.json();
      if (json.success) { await load(); }
      else showToast('❌ '+json.error);
    } catch { showToast('❌ Server error'); }
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try {
      const res  = await fetch(`/delete_task/${id}`,{method:'DELETE'});
      const json = await res.json();
      if (json.success) { await load(); showToast('✅ Deleted'); }
      else showToast('❌ '+json.error);
    } catch { showToast('❌ Server error'); }
  }

  function openAdd() {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'New Task';
    ['tTitle','tDesc','tLinked'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('tPriority').value = 'Medium';
    document.getElementById('tCategory').value = 'General';
    document.getElementById('tDue').value  = today;
    document.getElementById('tTime').value = '';
    document.getElementById('modal').classList.add('open');
  }

  function openEdit(id) {
    const t = _tasks.find(x=>x.id===id); if(!t) return;
    document.getElementById('editId').value    = id;
    document.getElementById('modalTitle').textContent = 'Edit Task';
    document.getElementById('tTitle').value    = t.title||'';
    document.getElementById('tDesc').value     = t.description||'';
    document.getElementById('tPriority').value = t.priority||'Medium';
    document.getElementById('tCategory').value = t.category||'General';
    document.getElementById('tDue').value      = t.due_date||'';
    document.getElementById('tTime').value     = t.due_time||'';
    document.getElementById('tLinked').value   = t.linked_to||'';
    document.getElementById('modal').classList.add('open');
  }

  async function saveTask() {
    const title = document.getElementById('tTitle').value.trim();
    if (!title) { showToast('⚠️ Enter a title'); return; }
    const editId = document.getElementById('editId').value;
    const data = {
      title,
      description: document.getElementById('tDesc').value.trim(),
      priority:    document.getElementById('tPriority').value,
      category:    document.getElementById('tCategory').value,
      due_date:    document.getElementById('tDue').value,
      due_time:    document.getElementById('tTime').value,
      linked_to:   document.getElementById('tLinked').value.trim(),
    };
    try {
      const url = editId ? `/update_task/${editId}` : '/save_task';
      const res  = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      const json = await res.json();
      if (json.success) { closeModal(); await load(); showToast(editId?'✅ Task updated!':'✅ Task added!'); }
      else showToast('❌ '+(json.error||'Error'));
    } catch { showToast('❌ Server error'); }
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  function showToast(msg,dur=3500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}
  function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

  load();
</script>
</body>
</html>

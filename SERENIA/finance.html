<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Nunito',sans-serif;overflow:hidden}
    .header{background:#1400cc;display:flex;align-items:center;padding:0 24px;height:54px;flex-shrink:0;box-shadow:0 2px 16px rgba(20,0,204,.4);position:relative;z-index:10}
    .back-btn{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.3);border-radius:10px;padding:7px 18px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:background .2s;flex-shrink:0}
    .back-btn:hover{background:rgba(255,255,255,.26)}
    .header h1{font-size:1.6rem;font-weight:900;letter-spacing:.08em;color:#fff;text-transform:uppercase;flex:1;text-align:center}
    .reload-btn{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.25);border-radius:10px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;transition:background .2s;flex-shrink:0}
    .reload-btn:hover{background:rgba(255,255,255,.22)}
    .frame-wrap{width:100%;height:calc(100vh - 54px);position:relative}
    #financeFrame{width:100%;height:100%;border:none;display:block}
    .loading-overlay{position:absolute;inset:0;background:#0f0f23;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
    .loading-overlay.hidden{opacity:0;pointer-events:none}
    .spinner{width:52px;height:52px;border:5px solid rgba(129,140,248,.15);border-top-color:#818cf8;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:rgba(255,255,255,.5);font-weight:800;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase}
    .error-overlay{position:absolute;inset:0;background:#0f0f23;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:40px}
    .error-overlay.show{display:flex}
    .error-overlay .em{font-size:3.5rem}
    .error-overlay h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.06em}
    .error-overlay p{color:rgba(255,255,255,.4);font-weight:700;font-size:.9rem;max-width:400px;line-height:1.6}
    .retry-btn{margin-top:8px;background:#1400cc;color:#fff;border:none;border-radius:12px;padding:12px 32px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:background .2s,transform .15s}
    .retry-btn:hover{background:#2c14ff;transform:scale(1.04)}
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.location.href='home.html'">← BACK</button>
    <h1>FINANCE</h1>
    <button class="reload-btn" onclick="reloadFrame()">⟳ Reload</button>
  </div>

  <div class="frame-wrap">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading Finance App…</div>
    </div>
    <div class="error-overlay" id="errorOverlay">
      <div class="em">💸</div>
      <h2>Finance App Not Ready</h2>
      <p>The finance server is starting up. Wait a few seconds and retry.</p>
      <button class="retry-btn" onclick="reloadFrame()">Retry</button>
    </div>
    <iframe id="financeFrame" src="" onload="frameLoaded()" onerror="frameError()"></iframe>
  </div>

  <script>
    let _timer;

    // On localhost → load finance directly (CSS/JS work perfectly, no proxy needed)
    // On Serveo / any remote → use /fin/ reverse proxy (single URL, all devices)
    function getFinanceURL() {
      const h = window.location.hostname;
      return (h === 'localhost' || h === '127.0.0.1')
        ? 'http://localhost:5000'
        : '/fin/';
    }

    function frameLoaded() {
      clearTimeout(_timer);
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('errorOverlay').classList.remove('show');
    }

    function frameError() {
      clearTimeout(_timer);
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('errorOverlay').classList.add('show');
    }

    function reloadFrame() {
      document.getElementById('loadingOverlay').classList.remove('hidden');
      document.getElementById('errorOverlay').classList.remove('show');
      document.getElementById('financeFrame').src = getFinanceURL();
      clearTimeout(_timer);
      _timer = setTimeout(frameError, 8000);
    }

    // Load on start
    document.getElementById('financeFrame').src = getFinanceURL();
    _timer = setTimeout(frameError, 8000);
  </script>

</body>
</html>

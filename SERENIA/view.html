<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Properties (UAE) – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent:     #1400cc;
      --accent-h:   #2c14ff;
      --panel-bg:   #1400cc;
      --off:        #f4f4f8;
      --text:       #0a0030;
      --card:       #ffffff;
      --gray:       #aaa;
      --panel-w:    272px;
      --flag:       '🇦🇪';
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--off);color:var(--text);overflow:hidden}

    .layout{display:flex;height:100vh;width:100vw}

    /* LEFT PANEL */
    .left-panel{width:var(--panel-w);min-width:var(--panel-w);background:var(--panel-bg);display:flex;flex-direction:column;height:100vh;overflow:hidden}

    .panel-flag{background:rgba(0,0,0,.15);text-align:center;padding:8px;font-size:.75rem;font-weight:900;letter-spacing:.1em;color:rgba(255,255,255,.7);text-transform:uppercase}

    .panel-top{padding:12px 16px 10px;flex-shrink:0}
    .home-btn{width:100%;background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-radius:10px;cursor:pointer;margin-bottom:12px;transition:background .2s;text-align:left}
    .home-btn:hover{background:rgba(255,255,255,.22)}

    .search-wrap{position:relative;margin-bottom:4px}
    .search-wrap input{width:100%;background:#fff;border:none;border-radius:10px;padding:10px 34px 10px 34px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);outline:none}
    .search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.85rem;color:#999;pointer-events:none}
    .search-wrap .sc{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:1rem;color:#999;cursor:pointer;display:none;line-height:1}
    .search-wrap input:not(:placeholder-shown)~.sc{display:block}

    .filter-scroll{flex:1;overflow-y:auto;padding:8px 16px 12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
    .filter-scroll::-webkit-scrollbar{width:4px}
    .filter-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:4px}

    .fs{margin-bottom:16px}
    .fl{color:rgba(255,255,255,.55);font-size:.7rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
    .fi,.fsel{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 12px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.86rem;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s,background .2s}
    .fi::placeholder{color:rgba(255,255,255,.38)}
    .fi:focus,.fsel:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.18)}
    .fsel option{background:var(--accent);color:#fff}
    .rrow{display:flex;gap:6px}
    .rrow .fi{flex:1}
    .rsep{color:rgba(255,255,255,.45);font-weight:900;font-size:.82rem;align-self:center;flex-shrink:0}

    .total-count{color:rgba(255,255,255,.8);font-size:.82rem;font-weight:800;letter-spacing:.04em;text-align:center;padding:10px 16px 6px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.12)}
    .total-count span{color:#fff;font-size:1.1rem}

    .clear-btn{margin:8px 16px 14px;flex-shrink:0;width:calc(100% - 32px);background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-weight:900;font-size:.8rem;letter-spacing:.07em;text-transform:uppercase;padding:9px;border-radius:10px;cursor:pointer;transition:background .2s,color .2s}
    .clear-btn:hover{background:rgba(255,255,255,.2);color:#fff}

    /* RIGHT PANEL */
    .right-panel{flex:1;height:100vh;overflow-y:auto;padding:32px 36px;scrollbar-width:thin;scrollbar-color:var(--gray) transparent}
    .right-panel::-webkit-scrollbar{width:6px}
    .right-panel::-webkit-scrollbar-thumb{background:var(--gray);border-radius:6px}

    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .panel-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.06em;color:var(--accent)}
    .panel-header .flag-badge{background:var(--accent);color:#fff;font-size:.8rem;font-weight:900;letter-spacing:.08em;padding:7px 16px;border-radius:10px;text-transform:uppercase}

    /* GRID */
    .prop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px 36px}

    /* CARD */
    .prop-card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(20,0,204,.1),0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:transform .2s,box-shadow .2s;animation:cIn .4s ease both}
    .prop-card:hover{transform:translateY(-5px) scale(1.015);box-shadow:0 12px 36px rgba(20,0,204,.2),0 4px 14px rgba(0,0,0,.09)}
    @keyframes cIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

    .card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--accent)}
    .card-no-img{width:100%;aspect-ratio:4/3;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:2.8rem;color:rgba(255,255,255,.25)}
    .card-body{padding:13px 16px 15px}
    .card-id{font-size:.68rem;font-weight:900;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.04em;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-sub{font-size:.78rem;font-weight:700;color:#666;margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
    .tag{background:var(--off);border-radius:6px;padding:3px 9px;font-size:.7rem;font-weight:800;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
    .tag.cat{background:var(--accent);color:#fff}
    .card-price{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--accent);letter-spacing:.04em}

    .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:#bbb}
    .empty-state .em{font-size:3.2rem;margin-bottom:14px}
    .empty-state p{font-weight:800;font-size:1rem;letter-spacing:.06em;text-transform:uppercase}

    .loading-state{grid-column:1/-1;display:flex;justify-content:center;padding:80px}
    .spinner{width:46px;height:46px;border:5px solid rgba(20,0,204,.12);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:860px){.prop-grid{grid-template-columns:1fr}.right-panel{padding:20px 16px}}
  </style>
</head>
<body>
<div class="layout">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-flag">🇦🇪 &nbsp; UAE — AED</div>

    <div class="panel-top">
      <button class="home-btn" onclick="window.location.href='prop.html'">← PROPERTIES</button>
      <button class="home-btn" onclick="window.location.href='compare.html'" style="background:rgba(217,119,6,.25);border-color:rgba(217,119,6,.4);margin-bottom:8px">⚖️ COMPARE</button>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name, city, ID…" oninput="applyFilters()"/>
        <span class="sc" onclick="clearSearch()">✕</span>
      </div>
    </div>

    <div class="filter-scroll">

      <div class="fs"><div class="fl">Category</div>
        <select class="fsel" id="fCat" onchange="applyFilters()">
          <option value="">All</option>
          <option>Rent</option>
          <option>Own / Buy</option>
          <option>Lease</option>
          <option>Short-Term Rental</option>
          <option>Commercial Lease</option>
          <option>Other</option>
        </select>
      </div>

      <div class="fs"><div class="fl">Property Type</div>
        <select class="fsel" id="fType" onchange="applyFilters()">
          <option value="">All</option>
          <option>Apartment</option>
          <option>Penthouse</option>
          <option>Bungalow</option>
          <option>Townhouse</option>
          <option>Villa</option>
          <option>Studio</option>
          <option>Duplex</option>
          <option>Warehouse</option>
          <option>Office</option>
          <option>Retail</option>
          <option>Land</option>
          <option>Other</option>
        </select>
      </div>

      <div class="fs"><div class="fl">City / Area</div>
        <input class="fi" type="text" id="fCity" placeholder="e.g. Dubai, Abu Dhabi…" oninput="applyFilters()"/>
      </div>

      <div class="fs"><div class="fl">Sale Price (AED)</div>
        <div class="rrow">
          <input class="fi" type="number" id="fPMin" placeholder="Min" oninput="applyFilters()"/>
          <span class="rsep">—</span>
          <input class="fi" type="number" id="fPMax" placeholder="Max" oninput="applyFilters()"/>
        </div>
      </div>

      <div class="fs"><div class="fl">Monthly Rent (AED)</div>
        <div class="rrow">
          <input class="fi" type="number" id="fRMin" placeholder="Min" oninput="applyFilters()"/>
          <span class="rsep">—</span>
          <input class="fi" type="number" id="fRMax" placeholder="Max" oninput="applyFilters()"/>
        </div>
      </div>

      <div class="fs"><div class="fl">Bedrooms</div>
        <select class="fsel" id="fBeds" onchange="applyFilters()">
          <option value="">Any</option>
          <option value="0">Studio / 0</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
          <option value="5">5+</option>
        </select>
      </div>

      <div class="fs"><div class="fl">Bathrooms</div>
        <select class="fsel" id="fBaths" onchange="applyFilters()">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
        </select>
      </div>

      <div class="fs"><div class="fl">Area (sq ft)</div>
        <div class="rrow">
          <input class="fi" type="number" id="fAMin" placeholder="Min" oninput="applyFilters()"/>
          <span class="rsep">—</span>
          <input class="fi" type="number" id="fAMax" placeholder="Max" oninput="applyFilters()"/>
        </div>
      </div>

      <div class="fs"><div class="fl">Per Sq Ft (AED)</div>
        <div class="rrow">
          <input class="fi" type="number" id="fSMin" placeholder="Min" oninput="applyFilters()"/>
          <span class="rsep">—</span>
          <input class="fi" type="number" id="fSMax" placeholder="Max" oninput="applyFilters()"/>
        </div>
      </div>

    </div>

    <div class="total-count" id="totalCount">Found: <span>—</span></div>
    <button class="clear-btn" onclick="clearFilters()">✕ Clear All Filters</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="panel-header">
      <h1>Properties</h1>
      <div class="flag-badge">🇦🇪 UAE — AED</div>
    </div>
    <div class="prop-grid" id="propGrid">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script>
  let ALL = [];

  async function load() {
    try {
      const res = await fetch('/get_properties');
      ALL = (await res.json()).filter(p => (p.region||'UAE') !== 'India');
      applyFilters();
    } catch {
      document.getElementById('propGrid').innerHTML = `<div class="empty-state"><div class="em">⚠️</div><p>Could not connect</p></div>`;
      document.querySelector('#totalCount span').textContent = '0';
    }
  }

  function applyFilters() {
    const q    = document.getElementById('searchInput').value.trim().toLowerCase();
    const cat  = document.getElementById('fCat').value;
    const type = document.getElementById('fType').value;
    const city = document.getElementById('fCity').value.trim().toLowerCase();
    const pMin = +document.getElementById('fPMin').value||0;
    const pMax = +document.getElementById('fPMax').value||Infinity;
    const rMin = +document.getElementById('fRMin').value||0;
    const rMax = +document.getElementById('fRMax').value||Infinity;
    const beds = document.getElementById('fBeds').value;
    const bths = document.getElementById('fBaths').value;
    const aMin = +document.getElementById('fAMin').value||0;
    const aMax = +document.getElementById('fAMax').value||Infinity;
    const sMin = +document.getElementById('fSMin').value||0;
    const sMax = +document.getElementById('fSMax').value||Infinity;

    const res = ALL.filter(p => {
      if (q) {
        const blob = [p.id,p.title,p.address,p.city,p.seller_name,p.property_type,p.category,p.description,p.sale_price_aed,p.monthly_rent_aed].join(' ').toLowerCase();
        if (!blob.includes(q)) return false;
      }
      if (cat  && p.category !== cat) return false;
      if (type && p.property_type !== type) return false;
      if (city && !(p.city||'').toLowerCase().includes(city)) return false;
      const sp = +p.sale_price_aed||0;
      if (sp > 0 && (sp < pMin || sp > pMax)) return false;
      const rn = +p.monthly_rent_aed||0;
      if (rn > 0 && (rn < rMin || rn > rMax)) return false;
      if (beds !== '' && (+p.bedrooms||0) < +beds) return false;
      if (bths !== '' && (+p.bathrooms||0) < +bths) return false;
      const ar = +p.area_sqft||0;
      if (ar > 0 && (ar < aMin || ar > aMax)) return false;
      const sf = +p.per_sqft_price_aed||0;
      if (sf > 0 && (sf < sMin || sf > sMax)) return false;
      return true;
    });

    renderGrid(res);
    document.querySelector('#totalCount span').textContent = res.length;
  }

  function renderGrid(props) {
    const g = document.getElementById('propGrid');
    if (!props.length) {
      g.innerHTML = `<div class="empty-state"><div class="em">🏚️</div><p>No properties found</p></div>`;
      return;
    }
    g.innerHTML = props.map((p,i) => {
      const img = p.photos&&p.photos.length
        ? `<img class="card-img" src="/photos/${p.photos[0]}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="card-no-img" style="display:none">🏠</div>`
        : `<div class="card-no-img">🏠</div>`;
      const sp = p.sale_price_aed ? `AED ${Number(p.sale_price_aed).toLocaleString()}` : p.monthly_rent_aed ? `AED ${Number(p.monthly_rent_aed).toLocaleString()} / mo` : 'Price N/A';
      const tags = [p.bedrooms?`${p.bedrooms} Bed`:'', p.bathrooms?`${p.bathrooms} Bath`:'', p.area_sqft?`${p.area_sqft} sqft`:''].filter(Boolean);
      const avail = p.availability || 'Available';
      const availColors = {Available:'#16a34a',  'Under Offer':'#d97706', Sold:'#dc2626', Rented:'#7c3aed'};
      const availColor  = availColors[avail] || '#16a34a';
      return `
        <div class="prop-card" style="animation-delay:${i*.05}s" onclick="window.location.href='propdet.html?id=${esc(p.id)}'">
          <div style="position:relative">
            ${img}
            <span style="position:absolute;top:8px;left:8px;background:${availColor};color:#fff;font-size:.62rem;font-weight:900;padding:3px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer" onclick="event.stopPropagation();quickAvail('${p.id}','${avail}')">${avail}</span>
          </div>
          <div class="card-body">
            <div class="card-id"># ${esc(p.id)}</div>
            <div class="card-title">${esc(p.title||'Untitled')}</div>
            <div class="card-sub">${esc([p.city,p.address].filter(Boolean).join(', ')||'—')}</div>
            <div class="card-tags">
              ${p.category?`<span class="tag cat">${esc(p.category)}</span>`:''}
              ${p.property_type?`<span class="tag">${esc(p.property_type)}</span>`:''}
              ${tags.map(t=>`<span class="tag">${t}</span>`).join('')}
            </div>
            <div class="card-price">${sp}</div>
          </div>
        </div>`;
    }).join('');
  }

  // Quick availability toggle popup
  let _availModal = null;
  function quickAvail(id, current) {
    if (_availModal) _availModal.remove();
    const opts = ['Available','Under Offer','Sold','Rented'];
    const colors = {Available:'#16a34a','Under Offer':'#d97706',Sold:'#dc2626',Rented:'#7c3aed'};
    const div = document.createElement('div');
    div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center';
    div.innerHTML = `<div style="background:#1e1e3a;border-radius:16px;padding:24px;width:280px;border:1px solid rgba(255,255,255,.1);box-shadow:0 12px 40px rgba(0,0,0,.5)">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.07em;color:#fff;margin-bottom:16px">Change Availability</div>
      ${opts.map(o=>`<button onclick="setAvail('${id}','${o}')" style="width:100%;background:${o===current?colors[o]+'33':'rgba(255,255,255,.06)'};border:1.5px solid ${o===current?colors[o]:'rgba(255,255,255,.1)'};color:${o===current?colors[o]:'rgba(255,255,255,.6)'};font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;padding:10px;border-radius:9px;cursor:pointer;margin-bottom:7px;transition:all .18s;text-align:left">${o===current?'✓ ':''} ${o}</button>`).join('')}
      <button onclick="document.getElementById('availModal').remove()" style="width:100%;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.4);font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;padding:9px;border-radius:9px;cursor:pointer">Cancel</button>
    </div>`;
    div.id = 'availModal';
    div.onclick = e => { if(e.target===div) div.remove(); };
    document.body.appendChild(div);
    _availModal = div;
  }

  async function setAvail(id, status) {
    document.getElementById('availModal')?.remove();
    try {
      const res  = await fetch(`/update_property_availability/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({availability:status})});
      const json = await res.json();
      if (json.success) { load(); }
    } catch {}
  }

  function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'' }
  function clearSearch(){ document.getElementById('searchInput').value=''; applyFilters(); }
  function clearFilters(){
    ['searchInput','fCity','fPMin','fPMax','fRMin','fRMax','fAMin','fAMax','fSMin','fSMax'].forEach(id=>document.getElementById(id).value='');
    ['fCat','fType','fBeds','fBaths'].forEach(id=>document.getElementById(id).value='');
    applyFilters();
  }

  load();
</script>
<script src="branding-loader.js"></script>
</body>
</html>

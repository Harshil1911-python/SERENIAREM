<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Properties – SERENIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
    }

    body {
      background-image: url('propbg.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-color: #000;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: #1a00cc;
      text-align: center;
      padding: 22px 20px 18px;
      position: relative;
    }
    .header h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fff;
      text-transform: uppercase;
    }
    .back-btn {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      padding: 10px 22px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.15s;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.28);
      transform: translateY(-50%) scale(1.05);
    }

    /* MAIN */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      gap: 40px;
    }

    /* STAT CARDS */
    .stats-row {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #fff;
      border-radius: 22px;
      padding: 28px 36px;
      min-width: 280px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s ease both;
    }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.15s; }
    .stat-card:nth-child(3) { animation-delay: 0.25s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-label {
      font-size: 1.05rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #111;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .stat-value {
      font-size: 3rem;
      font-weight: 900;
      color: #111;
      line-height: 1;
    }

    /* BOTTOM ROW */
    .bottom-row {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      animation: fadeUp 0.5s ease 0.35s both;
    }

    .action-btn {
      background: #1a00cc;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 22px;
      padding: 30px 80px;
      cursor: pointer;
      min-width: 280px;
      box-shadow: 0 6px 28px rgba(26,0,204,0.55), 0 4px 16px rgba(0,0,0,0.3);
      transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
    }
    .action-btn:hover {
      background: #2c0fff;
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 12px 40px rgba(26,0,204,0.75), 0 6px 24px rgba(0,0,0,0.35);
    }
    .action-btn:active { transform: scale(0.97); }

    /* LOADING OVERLAY */
    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #loadingOverlay.show { display: flex; }
    .spinner {
      width: 56px; height: 56px;
      border: 6px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .header h1 { font-size: 2rem; }
      .stat-card { min-width: 160px; padding: 20px 20px; }
      .action-btn { min-width: 160px; padding: 22px 36px; font-size: 1.6rem; }
      .stats-row, .bottom-row { gap: 16px; }
    }
  </style>
  <!-- Preload nav background images -->
  <link rel="preload" href="homebg.png" as="image"/>
  <link rel="preload" href="propbg.png" as="image"/>
  <link rel="preload" href="clientsbg.png" as="image"/>
  <script>
    // Preload backgrounds for instant feel
    ['homebg.png','propbg.png','clientsbg.png','sellerbg.png','buyerbg.png','empbg.png'].forEach(s=>{new Image().src=s});
  </script>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.location.href='home.html'">← BACK</button>
    <h1>PROPERTIES</h1>
  </div>

  <div class="content">

    <!-- TOP: 3 STAT CARDS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Properties<br>To Buy</div>
        <div class="stat-value" id="statBuy">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Properties<br>To Rent</div>
        <div class="stat-value" id="statRent">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Other Properties</div>
        <div class="stat-value" id="statOther">—</div>
      </div>
    </div>

    <!-- BOTTOM: LIST | TOTAL LISTED | VIEW -->
    <div class="bottom-row">
      <button class="action-btn" onclick="goTo('list.html')">LIST</button>

      <div class="stat-card">
        <div class="stat-label">Total Properties<br>Listed</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>

      <button class="action-btn" onclick="goTo('view.html')">VIEW</button>
    </div>

    <!-- MAP + COMPARE ROW -->
    <div class="bottom-row" style="animation-delay:.5s">
      <button class="action-btn" style="background:#0a7c3e;box-shadow:0 6px 28px rgba(10,124,62,.5);min-width:unset;padding:20px 60px;font-size:1.6rem" onclick="goTo('propmap.html')" onmouseover="this.style.background='#0d9e4f'" onmouseout="this.style.background='#0a7c3e'">🗺 MAP VIEW</button>
      <button class="action-btn" style="background:#d97706;box-shadow:0 6px 28px rgba(217,119,6,.5);min-width:unset;padding:20px 60px;font-size:1.6rem" onclick="goTo('compare.html')" onmouseover="this.style.background='#f59e0b'" onmouseout="this.style.background='#d97706'">⚖️ COMPARE</button>
    </div>

  </div>

  <div id="loadingOverlay"><div class="spinner"></div></div>

  <script>
    function goTo(page) {
      document.getElementById('loadingOverlay').classList.add('show');
      setTimeout(() => { window.location.href = page; }, 300);
    }

    async function loadStats() {
      try {
        const res = await fetch('/get_properties');
        if (!res.ok) throw new Error('fail');
        const props = await res.json();

        let buy = 0, rent = 0, other = 0;
        props.forEach(p => {
          const cat = (p.category || '').toLowerCase();
          if (cat.includes('buy') || cat.includes('own')) buy++;
          else if (cat.includes('rent')) rent++;
          else other++;
        });

        animateCount('statBuy',   buy);
        animateCount('statRent',  rent);
        animateCount('statOther', other);
        animateCount('statTotal', props.length);

      } catch (e) {
        ['statBuy','statRent','statOther','statTotal'].forEach(id => {
          document.getElementById(id).textContent = '0';
        });
      }
    }

    function animateCount(id, target) {
      const el = document.getElementById(id);
      if (target === 0) { el.textContent = '0'; return; }
      let current = 0;
      const steps = 30;
      const increment = Math.ceil(target / steps);
      const timer = setInterval(() => {
        current += increment;
        if (current >= target) { current = target; clearInterval(timer); }
        el.textContent = current;
      }, 20);
    }

    loadStats();
  </script>

<script src="branding-loader.js"></script>
</body>
</html>
